<div id="loading-overlay" class="loading-overlay">

</div>

<script>
function ini(nombre){if(!nombre)return '?';const parts=nombre.trim().split(' ').filter(Boolean);if(parts.length>=2)return(parts[0][0]+parts[1][0]).toUpperCase();const w=parts[0]||'';const m=w.slice(1).match(/[A-ZÁÉÍÓÚÑ]/);if(m)return(w[0]+m[0]).toUpperCase();return w.slice(0,2).toUpperCase();}
function hoy(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function pct(a,b){return b>0?Math.round(a/b*100)+'%':'0%';}
function ultimaFecha(c){const h=c.historial||[];return h.length?h[h.length-1].fecha:c.fechaContacto;}
function diasDesde(f,c){if(!f)return 0;const uf=ultimaFecha(c);const d1=new Date(f+'T12:00:00');const d2=new Date((uf||hoy())+'T12:00:00');return Math.max(0,Math.floor((d2-d1)/86400000));}
function diasTag(d){const n=parseInt(d)||0;if(n===0)return '<span class="dtag d0">Día 0</span>';if(n<=7)return '<span class="dtag d7">Día '+n+'</span>';if(n<=14)return '<span class="dtag d14">Día '+n+' <span class="dot red"></span></span>';return '<span class="dtag d14">Día '+n+' <span class="dot red"></span></span>';}

const LS_KEY='leads_local_v5';

// Normaliza un número de celular para comparar/buscar: solo dígitos, sin prefijo de país (51 Perú, 591 Bolivia)
function normCel(v){
  let d=String(v||'').replace(/\D/g,'');
  if(d.length>9&&d.startsWith('591'))d=d.slice(3);
  else if(d.length>9&&d.startsWith('51'))d=d.slice(2);
  return d;
}


const FLOTAS=['Aeropuerto','Aerolíneas','Ciudad','Plazas'];
const CANALES=['Meta','Referidos','Chat Afiliadora','App/web','Live'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SEMANAS=['1','2','3','4'];
const MESACT=MESES[new Date().getMonth()];
const flotaC={Aeropuerto:'t-aero','Aerolíneas':'t-air',Ciudad:'t-city',Plazas:'t-plazas'};
const canalC={Meta:'t-meta',Referidos:'t-ref','Chat Afiliadora':'t-chat','App/web':'t-app',Live:'t-live'};

const ETAPAS=[
  {id:0,label:'Contacto',       icon:'ti-phone',         cls:'e0'},
  {id:1,label:'Info enviada',   icon:'ti-send',          cls:'e1'},
  {id:2,label:'Docs recibidos', icon:'ti-file-check',    cls:'e2'},
  {id:3,label:'Formulario',     icon:'ti-forms',         cls:'e3'},
  {id:4,label:'Antecedentes',   icon:'ti-shield-check',  cls:'e4'},
  {id:5,label:'Entrevista Psi.',icon:'ti-brain',         cls:'e5'},
  {id:6,label:'Capacitación',   icon:'ti-school',        cls:'e6c'},
  {id:7,label:'Afiliado ✓',    icon:'ti-check-circle',  cls:'e6'},
];

const DEFAULT_USERS=[
  {id:'u1',nombre:'AndreaS',pin:'1234',role:'agente'},
  {id:'u2',nombre:'AndreaC',pin:'1234',role:'agente'},
  {id:'u3',nombre:'Jennifer',pin:'1234',role:'agente'},
  {id:'u4',nombre:'Rommy',pin:'1234',role:'agente'},
  {id:'mkt',nombre:'Marketing',pin:'mkt2024',role:'marketing'},
  {id:'admin',nombre:'Supervisor',pin:'admin123',role:'admin'},
];

let _mt=null; // timeout handle para auto-ocultar mensajes (gMsg)
let ST={
  users:DEFAULT_USERS.map(u=>({...u})),
  conductores:[],
  session:null, tab:'conductores',
  msg:null, msgType:'ok',
  selUser:null,
  syncing:false, syncErr:false, offline:false, lastSync:null,
  filtros:{busca:'',celular:'',flota:'',etapa:''},
};

// ── STORAGE: Firebase Realtime Database + localStorage fallback ──
const FB_URL='https://control-leads-9ec22-default-rtdb.firebaseio.com';
const FB_PATH='/leads';

function saveLocal(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      users:ST.users,conductores:ST.conductores,metas:ST.metas,savedAt:new Date().toISOString()
    }));
  }catch(e){}
}

function loadLocal(){
  try{
    const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if(d.users&&d.users.length) ST.users=d.users;
    if(d.conductores) ST.conductores=d.conductores;
    if(d.metas) ST.metas=d.metas;
    if(d.savedAt) ST.lastSync=new Date(d.savedAt);
  }catch(e){}
}

function syncBadge(){
  const dot=document.getElementById('sdot');
  const lbl=document.getElementById('slbl');
  if(!dot||!lbl)return;
  if(ST.syncing){dot.style.background='#F59E0B';lbl.textContent='Guardando...';return;}
  if(ST.syncErr){dot.style.background='#EF4444';lbl.textContent='Sin conexión';return;}
  dot.style.background='#22C55E';
  lbl.textContent=ST.lastSync?'Sincronizado ✓':'Listo';
}

function hideLoad(){
  document.getElementById('loading-overlay').style.display='none';
}

// Guardar en Firebase Y localStorage
async function saveBin(){
  saveLocal();
  ST.syncing=true; syncBadge();
  try{
    const data={users:ST.users,conductores:ST.conductores,metas:ST.metas||{}};
    const r=await fetch(FB_URL+FB_PATH+'.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify(data)
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    ST.syncErr=false;ST.lastSync=new Date();
  }catch(e){
    ST.syncErr=true;
  }
  ST.syncing=false; syncBadge();
}

// Cargar desde Firebase
async function loadBin(){
  try{
    const r=await fetch(FB_URL+FB_PATH+'.json',{method:'GET',headers:{'Accept':'application/json'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d&&d.users&&d.users.length){
      ST.users=d.users;
      ST.conductores=d.conductores||[];
      ST.metas=d.metas||ST.metas;
      saveLocal();
      ST.lastSync=new Date();ST.syncErr=false;
    }
  }catch(e){
    ST.syncErr=true;
  }
  syncBadge();
}

// Iniciar: carga local primero (instantáneo) luego Firebase
async function initBin(){
  loadLocal();
  hideLoad();
  render();
  // Luego sincroniza con Firebase en background
  try{
    const r=await fetch(FB_URL+FB_PATH+'.json',{headers:{'Accept':'application/json'}});
    if(r.ok){
      const d=await r.json();
      if(d&&d.conductores!==undefined){
        // Usar Firebase si tiene más o igual data que local
        if(!d.conductores||(d.conductores.length>=ST.conductores.length)){
          ST.users=d.users||ST.users;
          ST.conductores=d.conductores||[];
          ST.metas=d.metas||ST.metas;
          saveLocal();
        }
        ST.lastSync=new Date();ST.syncErr=false;
      }else{
        // Firebase vacío - subir datos locales
        await saveBin();
      }
    }
  }catch(e){
    ST.syncErr=true;
  }
  syncBadge();
  renderSec();
  // Auto-refresh cada 30s para ver cambios de otras usuarias
  setInterval(async()=>{
    if(!ST.session||ST.syncing)return;
    try{
      const r=await fetch(FB_URL+FB_PATH+'.json',{headers:{'Accept':'application/json'}});
      if(!r.ok)return;
      const d=await r.json();
      if(d&&d.conductores){
        const remoteLen=d.conductores.length;
        const localLen=ST.conductores.length;
        // Si hay cambios remotos, actualizar
        if(remoteLen!==localLen||JSON.stringify(d.conductores)!==JSON.stringify(ST.conductores)){
          ST.users=d.users||ST.users;
          ST.conductores=d.conductores;
          ST.metas=d.metas||ST.metas;
          saveLocal();
          ST.lastSync=new Date();ST.syncErr=false;
          syncBadge();
          renderSec(); // Re-render para mostrar cambios
        }
      }
    }catch(e){ST.syncErr=true;syncBadge();}
  },30000);
}

// Importar datos desde otro dispositivo


function gMsg(txt,type='ok',auto=4000){
  const el=document.getElementById('gmsg');if(!el)return;
  el.className=`msg msg-${type}`;el.innerHTML=`<i class="ti ti-${type==='ok'?'check-circle':'alert-triangle'}"></i><span>${txt}</span>`;
  el.classList.remove('hidden');
  if(_mt)clearTimeout(_mt);if(auto)_mt=setTimeout(()=>el.classList.add('hidden'),auto);
}
function diasDesde(f,c){
  // Si el conductor ya terminó el proceso (afiliado o dropout), 
  // contar solo hasta el último movimiento, no hasta hoy
  const inicio=new Date(f);
  let fin;
  if(c&&(c.etapa===7||c.dropout)){
    // Usar fecha del último movimiento en historial
    const ult=c.historial&&c.historial.length?c.historial[c.historial.length-1].fecha:f;
    fin=new Date(ult);
  }else{
    fin=new Date();fin.setHours(0,0,0,0);
  }
  inicio.setHours(0,0,0,0);
  return Math.max(0,Math.floor((fin-inicio)/(864e5)));
}
function diasTag(n){
  if(n<=3)return`<span class="days-ok">Día ${n}</span>`;
  if(n<=5)return`<span class="days-warn">Día ${n} ⚠</span>`;
  return`<span class="days-late">Día ${n} 🔴</span>`;
}
// Obtener última fecha de movimiento de un conductor
function ultimaFecha(c){
  if(!c.historial||!c.historial.length)return c.fechaContacto;
  return c.historial[c.historial.length-1].fecha;
}
// Semana del mes según día
// Devuelve clave única de semana lunes-domingo: "YYYY-WNN"
function semDia(d){
  const dt=new Date(d+'T12:00:00');
  const day=dt.getDay(); // 0=dom,1=lun...6=sab
  const diffToMon=day===0?-6:1-day;
  const lun=new Date(dt);
  lun.setDate(dt.getDate()+diffToMon);
  const y=lun.getFullYear();
  const inicio=new Date(y,0,1);
  const diffDias=Math.floor((lun-inicio)/(86400000));
  const nSem=Math.ceil((diffDias+inicio.getDay()+1)/7);
  return y+'-W'+(nSem<10?'0':'')+nSem;
}

// Devuelve el mes al que pertenece una semana: se asigna al mes del DOMINGO
// Ej: semana 29/06–05/07 → julio (porque el domingo 05/07 es julio)
function mesDeSemana(semKey){
  if(!semKey||!semKey.includes('-W'))return MESES[new Date().getMonth()];
  const [y,w]=semKey.split('-W');
  const año=parseInt(y); const nSem=parseInt(w);
  const ene1=new Date(año,0,1);
  const diasHastaLun=(nSem-1)*7-(ene1.getDay()||7)+1;
  const lun=new Date(año,0,1+diasHastaLun);
  const dom=new Date(lun); dom.setDate(lun.getDate()+6); // domingo
  return MESES[dom.getMonth()]||MESES[new Date().getMonth()];
}

// Devuelve el rango "dd/mm–dd/mm" del lunes al domingo de una clave semana
function semRng(semKey){
  if(!semKey||!semKey.includes('-W'))return semKey||'';
  const [y,w]=semKey.split('-W');
  const año=parseInt(y); const nSem=parseInt(w);
  const ene1=new Date(año,0,1);
  const diasHastaLun=(nSem-1)*7-(ene1.getDay()||7)+1;
  const lun=new Date(año,0,1+diasHastaLun);
  const dom=new Date(lun); dom.setDate(lun.getDate()+6);
  const fmt=(dt)=>(dt.getDate()<10?'0':'')+dt.getDate()+'/'+(dt.getMonth()+1<10?'0':'')+(dt.getMonth()+1);
  return fmt(lun)+'–'+fmt(dom);
}

// Etiqueta corta para mostrar en tablas: "Sem N (dd/mm–dd/mm)"
function semLabel(semKey){
  if(!semKey)return'';
  const w=semKey.split('-W')[1];
  return'Sem '+parseInt(w)+' ('+semRng(semKey)+')';
}
function mesDeF(f){return MESES[new Date(f+'T12:00:00').getMonth()]||MESACT;}

async function guardarC(){
  const n=document.getElementById('cn-n')?.value.trim();
  const cel=document.getElementById('cn-cel')?.value.trim();
  const fl=document.getElementById('cn-fl')?.value;
  const ca=document.getElementById('cn-ca')?.value;
  const f=document.getElementById('cn-f')?.value||hoy();
  const nota=document.getElementById('cn-nota')?.value||'';
  const err=document.getElementById('cn-err');
  if(!n){err.textContent='El nombre es obligatorio.';return;}
  if(!cel){err.textContent='El celular es obligatorio.';return;}
  if(!fl){err.textContent='Selecciona una flota.';return;}
  if(!ca){err.textContent='Selecciona un canal.';return;}

  // ── Validación de duplicados solo por celular ──
  // Normalizar: quitar dígitos no numéricos y prefijo 51 o 591 para comparar (usa normCel global)
  const celNorm=normCel(cel);
  const dupCel=celNorm.length>=7?ST.conductores.find(x=>normCel(x.celular)===celNorm):null;
  if(dupCel){
    const ag=ST.users.find(x=>x.id===dupCel.agenteId);
    err.textContent='⚠ Ya existe un conductor con el celular '+cel+' registrado por '+(ag?ag.nombre:'otra afiliadora')+' ('+dupCel.nombre+').';
    err.style.color='#B45309';
    return;
  }

  const u=ST.users.find(x=>x.id===ST.session);
  const isA=u&&u.role==='admin';
  const agenteId=isA?(document.getElementById('cn-ag')?.value||ST.session):ST.session;
  ST.conductores.push({
    id:'c'+Date.now(),nombre:n,celular:cel,flota:fl,canal:ca,agenteId,
    fechaContacto:f,etapa:0,dropout:false,motivoDropout:'',
    historial:[{fecha:f,etapa:0,nota:nota||'Primer contacto',usuario:u.nombre}],
  });
  await saveBin();closeM();renderSec();
  gMsg(`Conductor "${n}" registrado.`);
}

async function guardarDrop(id){
  const m=document.getElementById('dm')?.value;
  const nota=document.getElementById('dn')?.value||'';
  if(!m){document.getElementById('d-err').textContent='Selecciona un motivo.';return;}
  const c=ST.conductores.find(x=>x.id===id);
  const u=ST.users.find(x=>x.id===ST.session);
  c.dropout=true;c.motivoDropout=m;c.historial=c.historial||[];
  c.historial.push({fecha:hoy(),etapa:c.etapa,nota:`Baja: ${m}. ${nota}`,usuario:u.nombre});
  await saveBin();closeM();renderSec();
  gMsg('Conductor marcado como no continúa.');
}
async function elimC(id){

}

function renderDiario(isA,isMkt){
  const h=hoy();
  const agentes=ST.users.filter(x=>x.role==='agente');

  const actividadHoy=(agenteId)=>{
    const cs=ST.conductores.filter(c=>c.agenteId===agenteId);
    const nuevos=cs.filter(c=>c.fechaContacto===h);

  // AGENTE: solo ve su propio día

    const stDia=(arr)=>{

    const hdSt='padding:6px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:10px;font-weight:700;background:#DBEAFE;color:#1e3a5f;white-space:nowrap';
    const subHd='padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:10px;font-weight:600;background:#EFF6FF;color:#1e3a5f';

  if(isMkt){

      ${miniTabla(nuevosMkt,'🆕 Nuevos contactados hoy','#185FA5',h)}
      ${miniTabla(movMkt,'🔄 Con avance de etapa hoy','#5B21B6',h)}
      ${!todosHoyMkt.length?'<div style="text-align:center;padding:2rem;color:var(--text2)">Sin actividad registrada hoy.</div>':''}
    </div>`;
  }

  // Fecha seleccionada por el supervisor (original)
  const fDiaSv=document.getElementById('sv-dia-fecha')?.value||h;
  const esHoySv=fDiaSv===h;
  const fechaLabel=new Date(fDiaSv+'T12:00:00').toLocaleDateString('es-PE',{day:'numeric',month:'long'});

  // Filtrar por fecha seleccionada
  const todosHoy=[...ST.conductores.filter(c=>c.fechaContacto===fDiaSv),...ST.conductores.filter(c=>c.fechaContacto!==fDiaSv&&(c.historial||[]).some(x=>x.fecha===fDiaSv))];
  const totalNuevos=ST.conductores.filter(c=>c.fechaContacto===fDiaSv).length;
  const totalMov=ST.conductores.filter(c=>c.fechaContacto!==fDiaSv&&(c.historial||[]).some(x=>x.fecha===fDiaSv)).length;
  const totalAfil=todosHoy.filter(c=>c.etapa===7).length;
  const totalDrop=todosHoy.filter(c=>c.dropout).length;

  const agentesAdm=ST.users.filter(x=>x.role==='agente');

  const hdSt='padding:6px 5px;text-align:center;border:0.5px solid #CBD5E1;font-size:10px;font-weight:700;background:#DBEAFE;color:#1e3a5f;white-space:nowrap';

  const embHL='background:#FEF9C3;font-weight:700;color:#713F12';
  const celda=(v,bold,color)=>'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px;'+(bold?'font-weight:700;':'')+(color?'color:'+color+';':'')+'">'+( v||0)+'</td>';

  const tablaAgente=(ag)=>{
    const agIds=ST.users.filter(u=>u.nombre===ag.nombre).map(u=>u.id);

    const movDia=mis.filter(c=>c.fechaContacto!==fDiaSv&&(c.historial||[]).some(x=>x.fecha===fDiaSv));
    const todosAg=[...nuevosDia,...movDia];
    const stAg=(arr)=>{const s=calcStats(arr);return{chats:s.chats,activo:s.activo,noActivo:s.noActivo,califica:s.califica,noCalif:s.noCalif,bolsa:s.bolsa,anteced:s.anteced,desaprobK:s.desaprobK,evPsic:s.evPsic,desaprobM:s.desaprobM,capacit:s.capacit,desaprobC:s.desaprobC,afiliado:s.afiliado,noAfil:s.noAfil};};

function calcStats(arr){
  const chats     = arr.length;
  const activo    = arr.filter(c=>!c.dropout&&c.etapa>=1).length;
  const noActivo  = arr.filter(c=>!c.dropout&&c.etapa===0).length;
  const califica  = arr.filter(c=>!c.dropout&&c.etapa>=1).length;
  const noCalif   = arr.filter(c=>c.dropout).length;
  const bolsa     = arr.filter(c=>!c.dropout&&c.etapa>=1&&c.etapa<=6).length;
  const anteced   = arr.filter(c=>!c.dropout&&c.etapa===4).length;
  const desaprobK = arr.filter(c=>c.dropout&&c.etapa===5).length;
  const evPsic    = arr.filter(c=>!c.dropout&&c.etapa===5).length;
  const desaprobM = arr.filter(c=>c.dropout&&c.etapa===4).length;
  const capacit   = arr.filter(c=>!c.dropout&&c.etapa===6).length;
  const desaprobC = arr.filter(c=>c.dropout&&c.etapa===6).length;
  const afiliado  = arr.filter(c=>!c.dropout&&c.etapa===7).length;
  const noAfil    = arr.filter(c=>c.dropout).length;
  return{chats,activo,noActivo,califica,noCalif,bolsa,anteced,desaprobK,evPsic,desaprobM,capacit,desaprobC,afiliado,noAfil,
    noCalifica:noCalif,noAfiliado:noAfil};
}


function statsCanal(cs){
  const s=calcStats(cs);
  return{
    chats:     s.chats,
    ca:        s.activo,
    cn:        s.noActivo,
    nr:        s.califica,
    nd:        s.noCalif,
    pre:       s.bolsa,
    ant:       s.anteced,
    desaprobK: s.desaprobK,
    psi:       s.evPsic,
    desaprobM: s.desaprobM,
    cap:       s.capacit,
    desaprobC: s.desaprobC,
    afil:      s.afiliado,
    noAfil:    s.noAfil,
  };
}

function renderSemanal(){
  // Agrupar: la semana pertenece al mes de su DOMINGO
  const periodos={};
  ST.conductores.forEach(c=>{
    const ult=ultimaFecha(c);
    const sem=semDia(ult);
    const mes=mesDeSemana(sem); // mes del domingo de esa semana
    const k=mes+'|'+sem;
    if(!periodos[k])periodos[k]={mes,sem,cs:[]};
    periodos[k].cs.push(c);
  });

  const porMes={};
  Object.values(periodos).forEach(p=>{
    if(!porMes[p.mes])porMes[p.mes]=[];
    porMes[p.mes].push(p);
  });
  const mesesOrdenados=Object.keys(porMes).sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b));

  if(!mesesOrdenados.length) return'<div class="section-hdr"><div style="font-size:15px;font-weight:700">Reporte semanal</div></div><div class="card" style="color:var(--text2);text-align:center;padding:2rem">Sin datos registrados.</div>';

  const mesActivo=document.getElementById('sel-mes-sem')?.value||mesesOrdenados[mesesOrdenados.length-1];
  const semsDelMes=(porMes[mesActivo]||[]).sort((a,b)=>a.sem.localeCompare(b.sem));
  const metaVal=ST['meta_'+mesActivo]||0;

  // Rango de fechas del mes (primera sem lunes → última sem domingo)
  const rangoSem=semsDelMes.length>0
    ? semRng(semsDelMes[0].sem)+(semsDelMes.length>1?' — '+semRng(semsDelMes[semsDelMes.length-1].sem):'')
    : '';

  return'<div>'
    +'<div class="section-hdr" style="margin-bottom:12px">'
    +'<div style="font-size:15px;font-weight:700"><i class="ti ti-calendar-week" style="color:var(--blue);margin-right:6px"></i>Reporte semanal</div>'
    +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
    +'<select id="sel-mes-sem" onchange="renderSec()" style="height:32px;font-size:13px;padding:0 8px;border:1px solid var(--border2);border-radius:var(--radius-sm)">'
    +mesesOrdenados.map(m=>'<option value="'+m+'"'+(m===mesActivo?' selected':'')+'>'+m+'</option>').join('')
    +'</select>'
    +'<div style="display:flex;align-items:center;gap:6px;font-size:12px">'
    +'<label style="color:var(--text2);font-weight:600">Meta del mes:</label>'
    +'<input type="number" id="meta-mes-inp" value="'+metaVal+'" min="0" style="width:70px;height:32px;font-size:13px" onchange="setMeta(\''+mesActivo+'\',this.value)">'
    +'</div>'
    +'<button class="btn btn-sm" onclick="exportCSV(\'semanal\')"><i class="ti ti-download"></i> Exportar CSV</button>'
    +'</div></div>'
    +(rangoSem?'<div style="font-size:11px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px"><i class="ti ti-calendar"></i> <span style="background:var(--bg3);padding:2px 10px;border-radius:20px;border:1px solid var(--border)">📅 '+rangoSem+'</span></div>':'')
    +FLOTAS.map(flota=>{
      const semanas_data=semsDelMes.map((p,i)=>({
        sem:p.sem,
        numMes:i+1,
        rng:semRng(p.sem),
        label:'Semana '+(i+1)+' ('+semRng(p.sem)+')',
        cs:p.cs.filter(c=>c.flota===flota),
      }));
      if(!semanas_data.some(s=>s.cs.length)) return'<div class="card" style="padding:14px;color:var(--text2);display:flex;align-items:center;gap:8px"><span class="stag '+(flotaC[flota]||'')+'">'+flota+'</span> Sin datos este mes.</div>';
      return tablaExcelFlota(flota,semanas_data,metaVal);
    }).join('')
    +'</div>';
}


function setMeta(mes,val){
  ST[`meta_${mes}`]=+val||0;
  // no guardamos en bin para no sobrecargar, solo en memoria
}

// ── MENSUAL ──────────────────────────────────────────────

function getFechaAfil(c){
  // Get the date when conductor reached etapa 7
  if(c.fechaAfiliacion) return c.fechaAfiliacion;
  // Fallback: find in historial
  const h=(c.historial||[]).find(x=>x.etapa===7);
  if(h) return h.fecha;
  return null;
}

function editarAgente(id, agenteId){
  const c=ST.conductores.find(x=>x.id===id);
  if(!c)return;
  c.agenteId=agenteId;
  saveBin();
  gMsg('Afiliadora actualizada.');
}

function editarUltMov(id, fecha){
  const c=ST.conductores.find(x=>x.id===id);
  if(!c)return;
  c.historial=c.historial||[];
  if(c.historial.length>0){
    c.historial[c.historial.length-1].fecha=fecha;
  } else {
    const u=ST.users.find(x=>x.id===ST.session);
    c.historial.push({fecha:fecha,etapa:c.etapa,nota:'Fecha actualizada',usuario:u?u.nombre:'Supervisor'});
  }
  saveBin();
  gMsg('Último movimiento actualizado: '+fecha);
}

async function editarFechaAfil(id, fecha){
  const c=ST.conductores.find(x=>x.id===id);
  if(!c||c.etapa!==7)return;
  c.fechaAfiliacion=fecha;
  await saveBin();
  gMsg('Fecha de afiliación actualizada: '+fecha);
}

function renderMensual(){
  const mesSelEl=document.getElementById('rm-mes');
  const mesActual=MESES[new Date().getMonth()];
  const mesSel=mesSelEl?mesSelEl.value:mesActual;

  // Meses con datos
  const mesesConDatos=new Set();
  ST.conductores.forEach(c=>mesesConDatos.add(mesDeSemana(semDia(c.fechaContacto))));
  const mesesList=[...new Set([...MESES.filter(m=>mesesConDatos.has(m)),mesActual])];

  // Conductores del mes: por fechaContacto O por fechaAfiliacion en el mes
  const csMes=ST.conductores.filter(c=>{
    if(mesDeSemana(semDia(c.fechaContacto))===mesSel)return true;
    const fa=getFechaAfil(c);
    if(fa&&mesDeSemana(semDia(fa))===mesSel)return true;
    return false;
  });
  const metaVal=ST['meta_'+mesSel]||0;

  // semsMap: agrupado por semana de registro
  const semsMap={};
  csMes.forEach(c=>{
    const sk=semDia(c.fechaContacto);
    if(!semsMap[sk])semsMap[sk]=[];
    semsMap[sk].push(c);
  });

  // afilMap: agrupado por fecha de afiliación
  const afilMap={};
  ST.conductores.filter(cx=>cx.etapa===7).forEach(cx=>{
    const fa=getFechaAfil(cx);
    if(!fa)return;
    const sk=semDia(fa);
    if(!afilMap[sk])afilMap[sk]=[];
    afilMap[sk].push(cx);
  });

  const semsKeys=Object.keys(semsMap).sort();

  // Generar semanas del mes por calendario
  const semanasDelMes=[];
  const mesIdx2=MESES.indexOf(mesSel);
  let añoRef=new Date().getFullYear();
  if(semsKeys.length>0) añoRef=parseInt(semsKeys[0].split('-W')[0])||añoRef;
  const fmt2=(d)=>(d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
  for(let dia=1;dia<=31;dia++){
    const fecha=new Date(añoRef,mesIdx2,dia);
    if(fecha.getMonth()!==mesIdx2)break;
    if(fecha.getDay()===0){
      const dom=fecha;
      const lun=new Date(dom); lun.setDate(dom.getDate()-6);
      const lunStr=lun.getFullYear()+'-'+(lun.getMonth()+1<10?'0':'')+(lun.getMonth()+1)+'-'+(lun.getDate()<10?'0':'')+lun.getDate();
      semanasDelMes.push({sem:semDia(lunStr),numMes:semanasDelMes.length+1,rng:fmt2(lun)+'–'+fmt2(dom)});
    }
  }

  // Filtro de semanas seleccionadas
  const selSemsRaw=(()=>{try{return sessionStorage.getItem('rm-sems')||'';}catch(e){return '';}})()|| document.getElementById('rm-sems')?.value||'';
  const selSems=selSemsRaw&&selSemsRaw!=='99'?selSemsRaw.split(',').map(Number):[];
  const semanasVis=selSemsRaw==='99'?[]:semanasDelMes.filter((_,i)=>selSems.length===0||selSems.includes(i+1));

  // KPIs de semanas visibles
  const basVis=semanasVis.flatMap(sw=>semsMap[sw.sem]||[]);
  const gt=statsCanal(basVis);
  // Afiliados: conductores cuya fechaAfiliacion cae en las semanas VISIBLES (filtro activo)
  const semKeysVis=new Set(semanasVis.map(sw=>sw.sem));
  const totalAfil=ST.conductores.filter(cx=>{
    if(cx.etapa!==7||cx.dropout)return false;
    const fa=getFechaAfil(cx);
    if(fa&&semKeysVis.has(semDia(fa)))return true;
    // Si está en csMes y etapa===7 pero sin fecha confiable, incluir
    if(!fa&&csMes.some(cm=>cm.id===cx.id))return true;
    return false;
  }).length;

  // Motivos de baja por flota (semanas visibles)
  const motivosHTML=FLOTAS.map(flota=>{
    const bajas=basVis.filter(c=>c.dropout&&c.flota===flota);
    if(!bajas.length)return'';
    const mot={};
    bajas.forEach(c=>{const m=c.motivoDropout||'Sin especificar';mot[m]=(mot[m]||0)+1;});
    const rows=Object.entries(mot).sort((a,b)=>b[1]-a[1]).slice(0,5)
      .map(([m,n])=>'<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid var(--border)"><span>'+m+'</span><strong>'+n+'</strong></div>').join('');
    return'<div style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="stag '+(flotaC[flota]||'')+'">'+flota+'</span><span style="font-size:11px;color:var(--text2)">'+bajas.length+' bajas</span></div>'+rows+'</div>';
  }).join('');

  // Selector de mes
  const numSelSems=selSems.length===0?semanasDelMes.length:selSems.length;
  const selectorMes='<div style="display:flex;align-items:center;gap:8px">'
    +'<label style="font-size:13px;color:var(--text2)">Mes:</label>'
    +'<select id="rm-mes" onchange="document.getElementById(\'rm-sems\').value=\'\';renderSec()" style="height:32px;font-size:13px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--radius-sm)">'
    +mesesList.map(m=>'<option value="'+m+'"'+(m===mesSel?' selected':'')+'>'+m+'</option>').join('')
    +'</select></div>';

  // Filtro semanas dropdown
  const filtroSems='<div style="position:relative;display:inline-block;margin-bottom:12px">'
    +'<input type="hidden" id="rm-sems" value="'+selSemsRaw+'">'
    +'<button onclick="toggleDropSem(\'drop-rm\')" style="min-width:230px;height:34px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px">'
    +'<span><i class="ti ti-calendar-week" style="color:var(--blue);margin-right:4px"></i>Semanas: <strong>'+numSelSems+' de '+semanasDelMes.length+'</strong></span>'
    +'<i class="ti ti-chevron-down" style="font-size:12px;color:var(--text2)"></i>'
    +'</button>'
    +'<div id="drop-rm" style="display:none;position:absolute;top:38px;left:0;z-index:999;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:240px;padding:6px 0">'
    +'<div style="padding:6px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:6px">'
    +'<button class="btn btn-sm" style="font-size:11px" onclick="selTodasSems(\'rm-sems\')">Todas</button>'
    +'<button class="btn btn-sm" style="font-size:11px" onclick="selNingunasSems(\'rm-sems\')">Ninguna</button>'
    +'<button class="btn btn-sm sem-apply-btn" style="font-size:11px;background:#2563EB;color:#fff;margin-left:auto" onclick="aplicarFiltroSem(\'rm-sems\')">✓ Aplicar</button>'
    +'</div>'
    +semanasDelMes.map((sw,i)=>{
      const num=i+1; const sel=selSems.length===0||selSems.includes(num);
      return'<label style="display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:13px;background:'+(sel?'#EFF6FF':'transparent')+'" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\''+(sel?'#EFF6FF':'transparent')+'\'">'
        +'<input type="checkbox" data-num="'+num+'" '+(sel?'checked':'')+' onchange="toggleSemFiltro('+num+',this.checked,\'rm-sems\')" style="width:15px;height:15px;accent-color:var(--blue);cursor:pointer">'
        +'<span><strong>Sem '+num+'</strong> <span style="color:var(--text2);font-size:11px">('+sw.rng+')</span></span>'
        +'</label>';
    }).join('')
    +'</div>'
    +'</div>';

  // Flotas
  const flotas_html=FLOTAS.map(flota=>{
    if(!semanasVis.length) return'<div class="card" style="padding:12px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="stag '+(flotaC[flota]||'')+'">'+flota+'</span> Sin actividad este mes.</div>';
    const semsFlota=semanasVis.map(sw=>({
      sem:sw.sem,numMes:sw.numMes,rng:sw.rng,
      label:'Semana '+sw.numMes+' ('+sw.rng+')',
      cs:(semsMap[sw.sem]||[]).filter(x=>x.flota===flota),
      csAfil:(afilMap[sw.sem]||[]).filter(x=>x.flota===flota)
    }));
    return tablaExcelFlota(flota,semsFlota,metaVal);
  }).join('');

  const rangoMes=semanasVis.length>0
    ?semanasVis[0].rng+(semanasVis.length>1?' — '+semanasVis[semanasVis.length-1].rng:''):'';

  return'<div>'
    +'<div class="section-hdr" style="margin-bottom:12px">'
    +'<div style="font-size:15px;font-weight:700"><i class="ti ti-trending-up" style="color:var(--blue);margin-right:6px"></i>Reporte Sem/Mes</div>'
    +'<div style="display:flex;gap:8px;align-items:center">'+selectorMes
    +'<button class="btn btn-sm" onclick="exportTablaExcel_mensual()"><i class="ti ti-download"></i> Excel</button>'
    +'</div></div>'
    +filtroSems
    +'<div style="margin-bottom:10px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">'
    +'<span style="font-size:16px;font-weight:700"><i class="ti ti-calendar-month" style="color:var(--blue)"></i> '+mesSel+'</span>'
    +(rangoMes?'<span style="font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 10px;border-radius:20px;border:1px solid var(--border)">📅 '+rangoMes+'</span>':'')
    +'<div style="display:flex;align-items:center;gap:6px;font-size:12px">'
    +'<label style="color:var(--text2)">Meta del mes:</label>'
    +'<input type="number" value="'+metaVal+'" min="0" style="width:70px;height:28px;font-size:12px" onchange="setMeta(\''+mesSel+'\',this.value)">'
    +'</div></div>'
    +(semanasVis.length===0?'<div class="card" style="padding:2rem;text-align:center;color:var(--text2)">Sin actividad registrada en '+mesSel+'.</div>'
      :'<div class="g4" style="margin-bottom:1rem">'
      +'<div class="mcard"><div class="mval">'+gt.chats+'</div><div class="mlbl">Chats iniciados</div></div>'
      +'<div class="mcard"><div class="mval" style="color:var(--blue)">'+(gt.ca||0)+'</div><div class="mlbl">Cal. activos</div><div class="msub" style="color:var(--blue)">'+pct(gt.ca||0,gt.chats)+'</div></div>'
      +'<div class="mcard"><div class="mval" style="color:var(--green)">'+totalAfil+'</div><div class="mlbl">Afiliados</div><div class="msub" style="color:var(--green)">'+(metaVal>0?pct(totalAfil,metaVal)+' de meta':pct(totalAfil,gt.chats))+'</div></div>'
      +'<div class="mcard"><div class="mval" style="color:var(--err)">'+basVis.filter(c=>c.dropout).length+'</div><div class="mlbl">No continuaron</div></div>'
      +'</div>'
      +flotas_html
      +(motivosHTML?'<div class="card" style="margin-top:8px"><div class="card-title" style="font-size:13px"><i class="ti ti-x" style="color:var(--err)"></i> Motivos de baja — '+mesSel+'</div>'+motivosHTML+'</div>':''))
    +'</div>';
}

function updN(uid){
  const inp=document.getElementById('un-'+uid);
  if(!inp)return;
  const val=inp.value.trim();
  const u=ST.users.find(x=>x.id===uid);
  if(!u)return;
  if(!val){inp.value=u.nombre;return;} // no permitir dejar el nombre vacío
  if(u.nombre===val)return; // sin cambios (evita doble guardado por onchange+onblur)
  const anterior=u.nombre;
  u.nombre=val;
  saveBin();
  renderSec();
  gMsg('Nombre actualizado: "'+anterior+'" → "'+val+'".');
}

function openPin(uid){
  const u=ST.users.find(x=>x.id===uid);if(!u)return;
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeM()"><div class="modal-box">
      <div class="card-title"><i class="ti ti-lock" style="color:var(--blue)"></i> Cambiar PIN — ${u.nombre}</div>
      <div class="fg"><label>Nuevo PIN</label><input type="password" id="mp1" maxlength="20" autofocus placeholder="Mínimo 4 caracteres"></div>
      <div class="fg"><label>Confirmar PIN</label><input type="password" id="mp2" maxlength="20" placeholder="Repetir PIN"></div>
      <div id="mp-e" class="err-f" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-sm" onclick="closeM()">Cancelar</button>
        <button class="btn btn-p btn-sm" onclick="savePin('${uid}')"><i class="ti ti-check"></i> Guardar</button>
      </div>
    </div></div>`;
}

function savePin(uid){
  const p1=document.getElementById('mp1')?.value.trim();
  const p2=document.getElementById('mp2')?.value.trim();
  const err=document.getElementById('mp-e');
  if(!p1){err.textContent='Ingresa el nuevo PIN.';return;}
  if(p1.length<4){err.textContent='El PIN debe tener mínimo 4 caracteres.';return;}
  if(p1!==p2){err.textContent='Los PINs no coinciden.';return;}
  const u=ST.users.find(x=>x.id===uid);
  if(!u){err.textContent='Usuario no encontrado.';return;}
  u.pin=p1;
  saveBin();
  closeM();
  gMsg('PIN de '+u.nombre+' actualizado correctamente.');
}

function editarCelular(id, val){
  const c=ST.conductores.find(x=>x.id===id);
  if(!c)return;
  const norm=normCel(val);
  const dup=norm.length>=7?ST.conductores.find(x=>x.id!==id&&normCel(x.celular)===norm):null;
  if(dup){
    const ag=ST.users.find(x=>x.id===dup.agenteId);
    gMsg('⚠ Celular duplicado: ya existe en "'+dup.nombre+'" ('+(ag?ag.nombre:'otra afiliadora')+')');
    const inputs=[...document.querySelectorAll('input[type=tel]')].find(i=>i.value===val);
    if(inputs) inputs.value=c.celular||'';
    return;
  }
  c.celular=val.trim();
  saveBin();
  gMsg('Celular actualizado.');
}

function editarCanal(id, sel){
  const c=ST.conductores.find(x=>x.id===id);
  if(!c)return;
  c.canal=sel.value;
  saveBin();
  gMsg('Canal actualizado.');
}

function editarFlota(id, select){
  const c=ST.conductores.find(x=>x.id===id);
  if(!c)return;
  c.flota=select.value;
  // Registrar en historial
  const u=ST.users.find(x=>x.id===ST.session);
  if(c.historial) c.historial.push({fecha:hoy(),etapa:c.etapa,nota:'Flota cambiada a '+c.flota,usuario:u?u.nombre:'—'});
  saveBin();
  gMsg('Flota actualizada a '+c.flota);
}


function closeM(){document.getElementById('modal-container').innerHTML='';}

function exportCSV(tipo){
  let csv='\uFEFF';
  if(tipo==='conductores'){
    csv+='Nombre,Flota,Canal,Agente,Fecha contacto,Último movimiento,Etapa,Días proceso,Estado,Motivo baja\n';
    ST.conductores.forEach(c=>{
      const ag=ST.users.find(x=>x.id===c.agenteId);
      const et=c.dropout?'No continúa':(ETAPAS[c.etapa]?.label||'—');
      csv+=`"${c.nombre}","${c.flota}","${c.canal}","${ag?ag.nombre:'—'}","${c.fechaContacto}","${ultimaFecha(c)}","${et}",${diasDesde(c.fechaContacto)},"${c.dropout?'Baja':'Activo'}","${c.motivoDropout||''}"\n`;
    });
  } else if(tipo==='diario'){
    const h=hoy();
    const nuevos=ST.conductores.filter(c=>c.fechaContacto===h);
    const conMov=ST.conductores.filter(c=>c.fechaContacto!==h&&(c.historial||[]).some(x=>x.fecha===h));
    csv+='Tipo,Nombre,Flota,Canal,Agente,Etapa,Días,Nota hoy\n';
    [...nuevos.map(c=>['Nuevo',...c]),...conMov.map(c=>['Avance',...c])].forEach(([tipo2,...rest])=>{
      const c=rest[0]||rest;
      const conductor=typeof c==='object'?c:null;if(!conductor)return;
      const ag=ST.users.find(x=>x.id===conductor.agenteId);
      const et=conductor.dropout?'No continúa':(ETAPAS[conductor.etapa]?.label||'—');
      const ultH=(conductor.historial||[]).filter(x=>x.fecha===h).slice(-1)[0];
      csv+=`"${tipo2}","${conductor.nombre}","${conductor.flota}","${conductor.canal}","${ag?ag.nombre:'—'}","${et}",${diasDesde(conductor.fechaContacto)},"${ultH?ultH.nota:''}"\n`;
    });
  } else {
    csv+='Mes,Total actividad,Nuevos,En proceso,Afiliados,No continuaron,% Conversión\n';
    const meses={};
    ST.conductores.forEach(c=>{const m=mesDeF(ultimaFecha(c));if(!meses[m])meses[m]=[];meses[m].push(c);});
    Object.keys(meses).sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b)).forEach(mes=>{
      const cs=meses[mes];
      const nuevos=cs.filter(c=>mesDeF(c.fechaContacto)===mes).length;
      const afil=cs.filter(c=>c.etapa===7).length;
      csv+=`"${mes}",${cs.length},${nuevos},${cs.filter(c=>!c.dropout&&c.etapa<7).length},${afil},${cs.filter(c=>c.dropout).length},"${pct(afil,cs.length)}"\n`;
    });
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`leads_${tipo}_${hoy()}.csv`;a.click();
  gMsg('CSV descargado. Ábrelo con Excel.');

function filtrarTablaLista(){

function toggleDropSem(id){
  const el=document.getElementById(id);
  if(!el)return;
  const isOpen=el.style.display!=='none';
  document.querySelectorAll('[id^="drop-"]').forEach(d=>d.style.display='none');
  el.style.display=isOpen?'none':'block';
  if(!isOpen){
    setTimeout(()=>{
      const handler=(e)=>{
        if(!el.contains(e.target)&&!e.target.closest('[onclick*="toggleDropSem"]')){
          el.style.display='none';
          document.removeEventListener('click',handler);
        }
      };
      document.addEventListener('click',handler);
    },10);
  }
}

function toggleSemFiltro(num,checked,inputId){
  const dropId=inputId==='rm-sems'?'drop-rm':'drop-mr';
  const drop=document.getElementById(dropId);
  const allCks=drop?[...drop.querySelectorAll('input[type=checkbox]')]:[];
  const total=allCks.length||4;
  // Read and update sessionStorage
  let curVal=sessionStorage.getItem(inputId)||'';
  let vals=[];
  if(!curVal||curVal===''){vals=Array.from({length:total},(_,i)=>i+1);}
  else if(curVal==='99'){vals=[];}
  else{vals=curVal.split(',').map(Number).filter(Boolean);}
  if(checked){if(!vals.includes(num))vals.push(num);}
  else{vals=vals.filter(n=>n!==num);}
  vals.sort((a,b)=>a-b);
  const newVal=vals.length===0?'99':vals.length>=total?'':vals.join(',');
  sessionStorage.setItem(inputId,newVal);
  // Update button label only (no full re-render)
  const btn=drop?drop.previousElementSibling:null;
  if(btn){
    const shown=newVal===''?total:newVal==='99'?0:newVal.split(',').length;
    const strong=btn.querySelector('strong');
    if(strong)strong.textContent=shown+' de '+total;
  }
  // Update checkbox colors in-place
  if(drop){
    drop.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      const n=parseInt(cb.getAttribute('data-num')||'0');
      const sel=newVal===''||(newVal!=='99'&&newVal.split(',').map(Number).includes(n));
      cb.checked=sel;
      if(cb.parentElement)cb.parentElement.style.background=sel?'#EFF6FF':'transparent';
    });
  }
  // Mark apply button as needed
  const applyBtn=drop?drop.querySelector('.sem-apply-btn'):null;
  if(applyBtn)applyBtn.style.background='#2563EB';
}

  });

function mkProcesoView(visibles){
  const thSt='padding:6px 8px;text-align:center;border-bottom:2px solid var(--border);font-size:11px';

    const actv=fd.filter(function(x){return !x.dropout&&x.etapa<7&&x.etapa>=1;}).length;
    const afil=fd.filter(function(x){return x.etapa===7;}).length;
    const baja=fd.filter(function(x){return x.dropout;}).length;
    return '<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border)">'

      +'<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text2)">Bajas</span><strong style="color:var(--err)">'+baja+'</strong></div>'
      +'</div>';
  }).join('');

  // Etapa rows — etapas 1-6 en proceso
  const etapaRows=ETAPAS.filter(function(e){return e.id>0&&e.id<7;}).map(function(e){
    const tot=visibles.filter(function(x){return !x.dropout&&x.etapa===e.id;}).length;
    const flotas=FLOTAS.map(function(f){
      const n=visibles.filter(function(x){return !x.dropout&&x.etapa===e.id&&x.flota===f;}).length;
      return '<td style="'+tdSt+';font-weight:'+(n?'700':'400')+';color:'+(n?'var(--blue)':'var(--text2)')+'">'+( n||'—')+'</td>';
    }).join('');
    return '<tr><td style="padding:5px 8px;border-bottom:0.5px solid var(--border);font-size:12px"><span class="etag '+e.cls+'">'+e.label+'</span></td>'+flotas+'<td style="'+tdSt+';font-weight:700">'+tot+'</td></tr>';
  }).join('');

  // Afiliado row
  const afilRow=(function(){
    const tot=visibles.filter(function(x){return x.etapa===7;}).length;
    const flotas=FLOTAS.map(function(f){
      const n=visibles.filter(function(x){return x.etapa===7&&x.flota===f;}).length;
      return '<td style="'+tdSt+';font-weight:'+(n?'700':'400')+';color:'+(n?'#16A34A':'var(--text2)')+'">'+( n||'—')+'</td>';
    }).join('');
    return '<tr style="background:#F0FDF4"><td style="padding:5px 8px;border-bottom:0.5px solid var(--border);font-size:12px"><span class="etag e6" style="background:#DCFCE7;color:#166534">✓ Afiliado</span></td>'+flotas+'<td style="'+tdSt+';font-weight:700;color:#16A34A">'+tot+'</td></tr>';
  })();

  // No continúa row
  const dropRow=(function(){
    const tot=visibles.filter(function(x){return x.dropout;}).length;
    const flotas=FLOTAS.map(function(f){
      const n=visibles.filter(function(x){return x.dropout&&x.flota===f;}).length;
      return '<td style="'+tdSt+';font-weight:'+(n?'700':'400')+';color:'+(n?'#DC2626':'var(--text2)')+'">'+( n||'—')+'</td>';
    }).join('');
    return '<tr style="background:#FEF2F2"><td style="padding:5px 8px;border-bottom:0.5px solid var(--border);font-size:12px"><span class="etag e-drop">✗ No continúa</span></td>'+flotas+'<td style="'+tdSt+';font-weight:700;color:#DC2626">'+tot+'</td></tr>';
  })();

  const flotaThs=FLOTAS.map(function(f){return '<th style="'+thSt+'"><span class="stag '+(flotaC[f]||'')+' ">'+f+'</span></th>';}).join('');

  return '<div class="card" style="padding:14px;margin-bottom:1rem">'
    +'<div class="card-title" style="margin-bottom:12px"><i class="ti ti-chart-bar" style="color:var(--blue)"></i> Estado actual del proceso</div>'
    +'<div style="display:grid;grid-template-columns:repeat('+FLOTAS.length+',minmax(0,1fr));gap:8px;margin-bottom:12px">'+flotaCards+'</div>'

function calcularAvances(){
  const desde=document.getElementById('av-desde')?.value||hoy();
  const hasta=document.getElementById('av-hasta')?.value||hoy();
  const res=document.getElementById('avances-resultado');
  if(!res)return;

  // Build date array
  const fechas=[];
  const s=new Date(desde+'T12:00:00');
  const e=new Date(hasta+'T12:00:00');
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    fechas.push(d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate());
  }
  const dias=fechas.length;
  const meta=dias===1?(ST.metas?.agenteDia||1):dias<=7?(ST.metas?.agenteSem||2):(ST.metas?.agenteMes||9);

  const agentes=ST.users.filter(u=>u.role==='agente');
  const fmt=(f)=>{const p=f.split('-');return p[2]+'/'+p[1];};
  const rango=desde===hasta?fmt(desde):fmt(desde)+' al '+fmt(hasta);

  const hdS='padding:8px 10px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px;font-weight:700;background:#DBEAFE;color:#1e3a5f';
  const tdS=(v,color,bold)=>'<td style="padding:7px 10px;text-align:center;border:0.5px solid #CBD5E1;font-size:12px;'+(bold?'font-weight:700;':'')+(color?'color:'+color+';':'')+'">'+v+'</td>';

  const rows=agentes.map(ag=>{
    const agIds=ST.users.filter(u=>u.nombre===ag.nombre).map(u=>u.id);
    const mis=ST.conductores.filter(c=>agIds.includes(c.agenteId)||c.agenteId===ag.id);
    const enR=mis.filter(c=>fechas.includes(c.fechaContacto)||(c.historial||[]).some(x=>fechas.includes(x.fecha)));
    const s2=calcStats(enR);
    const nuevos=mis.filter(c=>fechas.includes(c.fechaContacto)).length;
    const pct2=meta>0?Math.round(s2.afiliado/meta*100):0;
    const bc=pct2>=100?'#16A34A':pct2>=60?'#2563EB':pct2>=30?'#F59E0B':'#DC2626';
    const bw=Math.min(100,pct2);
    return '<tr>'
      +'<td style="padding:7px 10px;border:0.5px solid #CBD5E1;font-weight:700;font-size:12px">'
      +'<div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="width:24px;height:24px;font-size:10px">'+ini(ag.nombre)+'</div>'+ag.nombre+'</div></td>'
      +tdS(nuevos,'#374151',false)
      +tdS(enR.length,'#374151',true)
      +tdS(s2.activo,'#185FA5',false)
      +tdS(s2.noCalif,'#DC2626',false)
      +tdS(s2.afiliado,s2.afiliado>0?'#16A34A':'#374151',true)
      +tdS(meta,'#6B7280',false)
      +'<td style="padding:7px 10px;border:0.5px solid #CBD5E1;min-width:140px">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<div style="flex:1;background:#E5E7EB;border-radius:20px;height:10px"><div style="width:'+bw+'%;background:'+bc+';border-radius:20px;height:10px"></div></div>'
      +'<span style="font-size:11px;font-weight:700;color:'+bc+';min-width:36px">'+pct2+'%</span>'
      +'</div></td></tr>';
  }).join('');

  res.innerHTML='<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Período: <strong>'+rango+'</strong> · '+dias+' día'+(dias!==1?'s':'')+' · Meta: <strong>'+meta+' afiliados/agente</strong></div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
    +'<thead><tr>'
    +'<th style="'+hdS+';text-align:left">Afiliadora</th>'
    +'<th style="'+hdS+'">Nuevos</th><th style="'+hdS+'">Total actividad</th>'
    +'<th style="'+hdS+'">Activos</th><th style="'+hdS+'">Bajas</th>'
    +'<th style="'+hdS+'">Afiliados</th><th style="'+hdS+'">Meta</th>'
    +'<th style="'+hdS+'">Cumplimiento</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function filtrarSV2(){
  const busca=(document.getElementById('sv2-busca')?.value||'').toLowerCase().trim();
  const cel=(document.getElementById('sv2-cel')?.value||'').replace(/\D/g,'').trim();
  const tbody=document.querySelector('#sv2-table tbody');
  if(!tbody){renderSec();return;}
  let vis=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const tds=[...tr.querySelectorAll('td')];
    if(!tds.length)return;
    const nombre=(tds[0]?.textContent||'').toLowerCase();
    // Celular cell may contain an input element
    const celInput=tds[1]?.querySelector('input');
    const celular=(celInput?celInput.value:(tds[1]?.textContent||'')).replace(/\D/g,'');
    const show=(!busca||nombre.includes(busca))&&(!cel||celular.includes(cel));
    tr.style.display=show?'':'none';
    if(show)vis++;
  });
  const cnt=document.querySelector('#sv2-count');
  if(cnt)cnt.textContent=vis+' conductor'+(vis!==1?'es':'')+' encontrado'+(vis!==1?'s':'');
}

function exportarTodosDatos(){
  const datos={conductores:ST.conductores,users:ST.users,metas:ST.metas,exportado:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(datos,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup_control_leads_'+hoy()+'.json';
  a.click();
  gMsg('✅ Backup descargado: '+ST.conductores.length+' conductores.');
}

function importarDatos(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const datos=JSON.parse(await file.text());
      if(!datos.conductores){gMsg('❌ Archivo inválido.');return;}
      if(!window.confirm('¿Restaurar backup?\n\n'+datos.conductores.length+' conductores\nExportado: '+(datos.exportado||'—')+'\n\n⚠️ Reemplazará los datos actuales.'))return;
      ST.conductores=datos.conductores;
      if(datos.users&&datos.users.length)ST.users=datos.users;
      if(datos.metas)ST.metas=datos.metas;
      await saveBin();renderSec();
      gMsg('✅ Restaurado: '+datos.conductores.length+' conductores.');
    }catch(err){gMsg('❌ Error: '+err.message);}
  };
  input.click();
}

async function guardarEdicionAdmin(id){
  const c=ST.conductores.find(x=>x.id===id);if(!c)return;
  const n=document.getElementById('ea-nombre')?.value.trim();
  const cel=document.getElementById('ea-cel')?.value.trim();
  const fecha=document.getElementById('ea-fecha')?.value;
  const flota=document.getElementById('ea-flota')?.value;
  const canal=document.getElementById('ea-canal')?.value;
  const agenteId=document.getElementById('ea-agente')?.value;
  const fechaAfil=document.getElementById('ea-fechaafil')?.value;
  const err=document.getElementById('ea-err');
  if(!n){err.textContent='El nombre es obligatorio.';return;}
  // Check celular duplicate
  const normCelFn=(v)=>{let d=(v||'').replace(/\D/g,'');if(d.length>9&&d.startsWith('51'))d=d.slice(2);return d;};
  const celNorm=normCelFn(cel);
  const dup=celNorm.length>=7?ST.conductores.find(x=>x.id!==id&&normCelFn(x.celular)===celNorm):null;
  if(dup){const ag=ST.users.find(x=>x.id===dup.agenteId);err.textContent='⚠ Celular duplicado: ya existe en "'+dup.nombre+'" ('+(ag?ag.nombre:'otra afiliadora')+').';return;}
  // Apply changes
  c.nombre=n;
  c.celular=cel;
  c.fechaContacto=fecha||c.fechaContacto;
  c.flota=flota;
  c.canal=canal;
  c.agenteId=agenteId;
  if(fechaAfil) c.fechaAfiliacion=fechaAfil;
  await saveBin();
  closeM();
  renderSec();
  gMsg('✅ Conductor actualizado correctamente.');
}

function procesarArchivoCarga(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();

  if(ext==='csv'){
    reader.onload=(e)=>{
      const text=e.target.result;
      const lines=text.split('\n').filter(l=>l.trim());
      const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());
      const rows=lines.slice(1).map(line=>{
        const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
        const obj={};
        headers.forEach((h,i)=>obj[h]=vals[i]||'');
        return obj;
      });
      _procesarRows(rows);
    };
    reader.readAsText(file,'UTF-8');
    return;
  }

  // .xlsx / .xls → parseo real con SheetJS
  reader.onload=(e)=>{
    if(typeof XLSX==='undefined'){
      gMsg('⚠ No se pudo cargar el lector de Excel. Revisa tu conexión e intenta de nuevo.');
      return;
    }
    let wb;
    try{
      wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    }catch(err){
      gMsg('⚠ No se pudo leer el archivo Excel. Verifica que no esté dañado.');
      return;
    }
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const matrix=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:''});
    _procesarReporteChat(matrix);
  };
  reader.readAsArrayBuffer(file);
}

// Ubica la fila de encabezados del "Reporte de Chat de Agentes" (por defecto fila 7 = índice 6)
function _detectarFilaEncabezado(matrix){
  const limite=Math.min(matrix.length,20);
  for(let i=0;i<limite;i++){
    const fila=matrix[i]||[];
    if(fila.some(c=>/agentes?\s*asignad/i.test(String(c||'')))) return i;
  }
  return 6; // fallback: fila 7 (1-based) tal como especifica el formato
}

// Busca dentro del texto de etiquetas (columna N) la flota, en este orden de prioridad
function _extraerFlotaDeEtiquetas(v){
  const up=String(v||'').toUpperCase();
  if(up.includes('AEROLINEAS')||up.includes('AEROLÍNEAS')) return 'Aerolíneas';
  if(up.includes('AEROPUERTO')) return 'Aeropuerto';
  if(up.includes('CIUDAD')) return 'Ciudad';
  if(up.includes('PLAZAS')) return 'Plazas';
  return '';
}

// Convierte "2026-06-29 01:06:51" (o variantes) a 'YYYY-MM-DD'
function _parseFechaReporte(v){
  const s=String(v||'').trim();
  if(!s) return hoy();
  const m=s.match(/^(\d{4}-\d{2}-\d{2})/);
  if(m) return m[1];
  return _parseFecha(s);
}

// Resuelve un código de agente (ej. 'sgonzales') al usuario-agente del sistema
function _resolverAgentePorCodigo(codigo){
  const key=String(codigo||'').trim().toLowerCase();
  if(!key) return null;
  const nombreCompleto=AGENTE_CODIGOS[key];
  const agentes=ST.users.filter(u=>u.role==='agente');
  if(nombreCompleto){
    const u=agentes.find(x=>x.nombre===nombreCompleto);
    if(u) return u;
  }
  // fallback: coincidencia flexible por nombre, por si el archivo trae el nombre completo
  return agentes.find(x=>x.nombre.toLowerCase()===key||x.nombre.toLowerCase().includes(key)||key.includes(x.nombre.toLowerCase().split(' ')[0]))||null;
}

function _procesarReporteChat(matrix){
  const headerIdx=_detectarFilaEncabezado(matrix);

  _cargaPreview=[];
  let filasVacias=0;
  // Teléfonos ya registrados en la app (no se tocan) — se va ampliando con cada nuevo conductor
  // encontrado en el archivo, para no crear varios registros del mismo conductor si aparece en varias filas.
  const celularesVistos=new Set(ST.conductores.map(c=>normCel(c.celular)).filter(c=>c.length>=7));

  for(let r=headerIdx+1;r<matrix.length;r++){
    const fila=matrix[r]||[];
    const fechaRaw=fila[1];   // B
    const nombre=String(fila[11]||'').trim();  // L
    const etiquetas=fila[13]; // N
    const celRaw=fila[14];    // O
    const agentesRaw=String(fila[17]||'').trim(); // R

    const cel=normCel(celRaw);
    if(!nombre&&!cel){filasVacias++;continue;}

    const flota=_extraerFlotaDeEtiquetas(etiquetas);
    const fecha=_parseFechaReporte(fechaRaw);
    const yaExiste=cel.length>=7&&celularesVistos.has(cel);

    if(yaExiste){
      // Ya está registrado (en la app o en una fila anterior de este mismo archivo): no se crea ni se modifica nada.
      _cargaPreview.push({nombre,cel,flota,canal:'Meta',agenteId:null,agenteCodigoOriginal:'',fecha,isDup:true,_row:r+1});
      continue;
    }
    if(cel.length>=7) celularesVistos.add(cel);

    const tokens=agentesRaw?agentesRaw.split(',').map(s=>s.trim()).filter(Boolean):[''];
    tokens.forEach(tok=>{
      const agenteUser=_resolverAgentePorCodigo(tok);
      _cargaPreview.push({
        nombre,cel,flota,canal:'Meta',
        agenteId:agenteUser?agenteUser.id:null,
        agenteCodigoOriginal:tok||'',
        fecha,isDup:false,_row:r+1
      });
    });
  }

  _renderCargaPreview(filasVacias);
}

function _parseFecha(v){
  if(!v)return hoy();
  v=String(v).trim();
  // DD/MM/YYYY
  const m1=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m1)return m1[3]+'-'+(m1[2].length<2?'0':'')+m1[2]+'-'+(m1[1].length<2?'0':'')+m1[1];
  // YYYY-MM-DD
  const m2=v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m2)return v;
  return hoy();
}

function _normalizarFlota(v){
  v=(v||'').toLowerCase();
  if(v.includes('aero') && v.includes('l')) return 'Aerolíneas';
  if(v.includes('aero')) return 'Aeropuerto';
  if(v.includes('plaza')) return 'Plazas';
  return 'Ciudad';
}

function _normalizarCanal(v){
  v=(v||'').toLowerCase();
  if(v.includes('ref')) return 'Referidos';
  if(v.includes('chat')) return 'Chat Afiliadora';
  if(v.includes('app') || v.includes('web')) return 'App/web';
  if(v.includes('live')) return 'Live';
  return 'Meta';
}

function _normalizarAgente(v){
  if(!v)return null;
  const nom=(v||'').toLowerCase();
  const ag=ST.users.filter(u=>u.role==='agente').find(u=>u.nombre.toLowerCase().includes(nom.split(' ')[0]));
  return ag?ag.id:null;
}

function _procesarRows(rows){
  _cargaPreview=[];
  const celularesVistos=new Set(ST.conductores.map(c=>normCel(c.celular)).filter(c=>c.length>=7));
  let err=0;

  rows.forEach((row,i)=>{
    const nombre=(row.nombre||row['name']||'').trim();
    const cel=normCel(row.celular||row['celular']||row['telefono']||row['phone']||'');
    if(!nombre&&!cel){err++;return;}
    const flota=_normalizarFlota(row.flota||'');
    const canal=_normalizarCanal(row.canal||'');
    const agenteId=_normalizarAgente(row.agente||row['afiliadora']||'');
    const fecha=_parseFecha(row.fecha||row['date']||'');
    const isDup=cel.length>=7&&celularesVistos.has(cel);
    if(!isDup&&cel.length>=7) celularesVistos.add(cel);
    _cargaPreview.push({nombre,cel,flota,canal,agenteId,fecha,isDup,_row:i+2});
  });

  _renderCargaPreview(err);
}

function _renderCargaPreview(filasVacias){
  const prev=document.getElementById('cm-preview');
  const stats=document.getElementById('cm-stats');
  const tabla=document.getElementById('cm-tabla');
  if(!prev)return;
  prev.style.display='block';

  filasVacias=filasVacias||0;
  const dup=_cargaPreview.filter(r=>r.isDup).length;
  const nuevos=_cargaPreview.filter(r=>!r.isDup);
  const sinFlota=nuevos.filter(r=>!r.flota).length;
  const sinAgente=nuevos.filter(r=>!r.agenteId&&r.agenteCodigoOriginal).length;
  const ok=nuevos.length;

  const agentes=ST.users.filter(u=>u.role==='agente');
  stats.innerHTML=`<div style="display:flex;gap:12px;flex-wrap:wrap">
    <span style="color:#166534;font-weight:700">✓ ${ok} nuevos (se importarán)</span>
    <span style="color:#92400E;font-weight:700">⏭ ${dup} ya registrados (no se importarán, no se modifican)</span>
    ${sinFlota>0?`<span style="color:var(--err)">${sinFlota} sin flota detectada</span>`:''}
    ${sinAgente>0?`<span style="color:var(--err)">${sinAgente} con código de agente no reconocido</span>`:''}
    ${filasVacias>0?`<span style="color:var(--text2)">${filasVacias} filas vacías ignoradas</span>`:''}
    <span style="color:var(--text2)">${_cargaPreview.length} total en archivo</span>
  </div>`;

  tabla.innerHTML='<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="background:var(--bg3)">'
    +'<th style="padding:4px 8px;text-align:left;font-size:11px;border-bottom:1px solid var(--border)">Nombre</th>'
    +'<th style="padding:4px 8px;font-size:11px;border-bottom:1px solid var(--border)">Celular</th>'
    +'<th style="padding:4px 8px;font-size:11px;border-bottom:1px solid var(--border)">Flota</th>'
    +'<th style="padding:4px 8px;font-size:11px;border-bottom:1px solid var(--border)">Agente</th>'
    +'<th style="padding:4px 8px;font-size:11px;border-bottom:1px solid var(--border)">Fecha</th>'
    +'</tr></thead><tbody>'
    +_cargaPreview.slice(0,50).map(r=>{
      const agenteLabel=r.isDup?'—':(r.agenteId
        ?(agentes.find(a=>a.id===r.agenteId)?.nombre.split(' ')[0]||'—')
        :(r.agenteCodigoOriginal?`<span style="color:var(--err)">'${r.agenteCodigoOriginal}' ?</span>`:'Sin asignar'));
      return `<tr style="background:${r.isDup?'#FEF3C7':''}">
      <td style="padding:3px 8px;font-size:11px;border-bottom:0.5px solid var(--border)">${r.nombre||'—'}${r.isDup?' <span style="color:#92400E;font-size:9px">YA REGISTRADO</span>':''}</td>
      <td style="padding:3px 8px;font-size:11px;border-bottom:0.5px solid var(--border);text-align:center">${r.cel||'—'}</td>
      <td style="padding:3px 8px;font-size:11px;border-bottom:0.5px solid var(--border);text-align:center">${r.isDup?'—':(r.flota||'<span style="color:var(--err)">?</span>')}</td>
      <td style="padding:3px 8px;font-size:11px;border-bottom:0.5px solid var(--border);text-align:center">${agenteLabel}</td>
      <td style="padding:3px 8px;font-size:11px;border-bottom:0.5px solid var(--border);text-align:center">${r.isDup?'—':r.fecha}</td>
    </tr>`;
    }).join('')
    +(_cargaPreview.length>50?`<tr><td colspan="5" style="padding:6px;text-align:center;color:var(--text2);font-size:11px">... y ${_cargaPreview.length-50} más</td></tr>`:'')
    +'</tbody></table>';
}

async function importarConductoresMasivo(){
  if(!_cargaPreview.length){gMsg('No hay datos para importar.');return;}
  const btn=document.getElementById('cm-import-btn');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}

  const ts=Date.now();
  let agregados=0, omitidos=0;
  const u=ST.users.find(x=>x.id===ST.session);

  _cargaPreview.forEach((row,i)=>{
    if(row.isDup){omitidos++;return;} // ya registrado: no se toca, no se importa

      id:'cm_'+ts+'_'+i,

      flota:row.flota,

}

function exportarXLSX(filas,nombre){
  const ag_name=(id)=>{const u=ST.users.find(x=>x.id===id);return u?u.nombre:'';};
  let html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body><table border="1">';
  html+='<tr style="background:#1e3a5f;color:#ffffff;font-weight:bold;font-size:12px">';
  ['#','Nombre','Celular','Flota','Canal','Agente','Fecha contacto','Ultimo movimiento','Dias en proceso','Etapa actual','Estado','Motivo baja'].forEach(h=>{html+='<td style="padding:6px 10px">'+h+'</td>';});
  html+='</tr>';
  filas.forEach((c,i)=>{
    const et=c.dropout?'No continua':(ETAPAS[c.etapa]?ETAPAS[c.etapa].label:'');
    const estado=c.etapa===7?'Afiliado':c.dropout?'Baja':'Activo';
    const bg=i%2===0?'#FFFFFF':'#F8F9FA';
    html+='<tr style="background:'+bg+';font-size:11px">';
    html+='<td style="text-align:center">'+(i+1)+'</td>';
    html+='<td style="font-weight:600">'+c.nombre+'</td>';
    html+='<td>'+(c.celular||'')+'</td>';
    html+='<td>'+c.flota+'</td>';
    html+='<td>'+c.canal+'</td>';
    html+='<td>'+ag_name(c.agenteId)+'</td>';
    html+='<td>'+c.fechaContacto+'</td>';
    html+='<td>'+ultimaFecha(c)+'</td>';
    html+='<td>'+diasDesde(c.fechaContacto,c)+'</td>';
    html+='<td>'+et+'</td>';
    const estadoColor=c.etapa===7?'color:#166534;font-weight:bold':c.dropout?'color:#A32D2D;font-weight:bold':'color:#185FA5';
    html+='<td style="'+estadoColor+'">'+estado+'</td>';
    html+='<td>'+(c.motivoDropout||'')+'</td>';
    html+='</tr>';
  });
  html+='</table></body></html>';
  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=nombre.replace('.xlsx','.xls');
  a.click();
}

function exportDataGral(){
  const fFlota=document.getElementById('dg-flota')?.value||'';
  const fCanal=document.getElementById('dg-canal')?.value||'';
  const fAgente=document.getElementById('dg-agente')?.value||'';
  const fEstado=document.getElementById('dg-estado')?.value||'';
  const fBusca=(document.getElementById('dg-busca')?.value||'').toLowerCase();
  const fCel=(document.getElementById('dg-cel')?.value||'').replace(/\D/g,'');
  const fF1=document.getElementById('dg-f1')?.value||'';
  const fF2=document.getElementById('dg-f2')?.value||'';
  let base=[...ST.conductores].sort((a,b)=>b.fechaContacto.localeCompare(a.fechaContacto));
  if(fFlota) base=base.filter(c=>c.flota===fFlota);
  if(fCanal) base=base.filter(c=>c.canal===fCanal);
  if(fAgente) base=base.filter(c=>c.agenteId===fAgente);
  if(fEstado==='activos') base=base.filter(c=>!c.dropout&&c.etapa<7);
  else if(fEstado==='afiliados') base=base.filter(c=>c.etapa===7);
  else if(fEstado==='dropout') base=base.filter(c=>c.dropout);
  if(fBusca) base=base.filter(c=>c.nombre.toLowerCase().includes(fBusca)||(c.celular||'').includes(fBusca));
  if(fCel) base=base.filter(c=>(c.celular||'').replace(/\D/g,'').includes(fCel));
  if(fF1) base=base.filter(c=>c.fechaContacto>=fF1);
  if(fF2) base=base.filter(c=>c.fechaContacto<=fF2);
  exportarXLSX(base,'data_general_'+hoy()+'.xls');
  gMsg('Excel descargado: '+base.length+' registros.');
}

function renderDataGral(){
  const fFlota=document.getElementById('dg-flota')?.value||'';
  const fCanal=document.getElementById('dg-canal')?.value||'';
  const fAgente=document.getElementById('dg-agente')?.value||'';
  const fEstado=document.getElementById('dg-estado')?.value||'';
  const fBusca=(document.getElementById('dg-busca')?.value||'').toLowerCase();
  const fCel=(document.getElementById('dg-cel')?.value||'').replace(/\D/g,'');
  const fF1=document.getElementById('dg-f1')?.value||'';
  const fF2=document.getElementById('dg-f2')?.value||'';
  let base=[...ST.conductores].sort((a,b)=>b.fechaContacto.localeCompare(a.fechaContacto));
  if(fFlota) base=base.filter(c=>c.flota===fFlota);
  if(fCanal) base=base.filter(c=>c.canal===fCanal);
  if(fAgente) base=base.filter(c=>c.agenteId===fAgente);
  if(fEstado==='activos') base=base.filter(c=>!c.dropout&&c.etapa<7);
  else if(fEstado==='afiliados') base=base.filter(c=>c.etapa===7);
  else if(fEstado==='dropout') base=base.filter(c=>c.dropout);
  if(fBusca) base=base.filter(c=>c.nombre.toLowerCase().includes(fBusca)||(c.celular||'').includes(fBusca));
  if(fCel) base=base.filter(c=>(c.celular||'').replace(/\D/g,'').includes(fCel));
  if(fF1) base=base.filter(c=>c.fechaContacto>=fF1);
  if(fF2) base=base.filter(c=>c.fechaContacto<=fF2);
  const all=ST.conductores;
  const kT=all.length,kA=all.filter(c=>!c.dropout&&c.etapa<7).length,kAf=all.filter(c=>c.etapa===7).length,kD=all.filter(c=>c.dropout).length;
  return'<div>'
    +'<div class="g4" style="margin-bottom:1rem">'
    +'<div class="mcard"><div class="mval">'+kT+'</div><div class="mlbl">Total registrados</div></div>'
    +'<div class="mcard"><div class="mval" style="color:var(--blue)">'+kA+'</div><div class="mlbl">En proceso</div></div>'
    +'<div class="mcard"><div class="mval" style="color:var(--green)">'+kAf+'</div><div class="mlbl">Afiliados</div><div class="msub" style="color:var(--green)">'+pct(kAf,kT)+'</div></div>'
    +'<div class="mcard"><div class="mval" style="color:var(--err)">'+kD+'</div><div class="mlbl">No continuaron</div></div>'
    +'</div>'
    +'<div class="card" style="padding:12px">'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:8px">'
    +'<div class="fg" style="margin:0"><label>Nombre</label><input type="text" id="dg-busca" placeholder="Buscar nombre..." oninput="debouncedSearch()"></div>'
    +'<div class="fg" style="margin:0"><label>Celular</label><input type="text" id="dg-cel" placeholder="Ej: 999888..." oninput="debouncedSearch()"></div>'
    +'<div class="fg" style="margin:0"><label>Flota</label><select id="dg-flota" onchange="renderSec()"><option value="">Todas</option>'+FLOTAS.map(f=>'<option value="'+f+'"'+(fFlota===f?' selected':'')+'>'+f+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Canal</label><select id="dg-canal" onchange="renderSec()"><option value="">Todos</option>'+CANALES.map(c=>'<option value="'+c+'"'+(fCanal===c?' selected':'')+'>'+c+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;align-items:end">'
    +'<div class="fg" style="margin:0"><label>Agente</label><select id="dg-agente" onchange="renderSec()"><option value="">Todos</option>'+ST.users.filter(x=>x.role==='agente').map(u=>'<option value="'+u.id+'"'+(fAgente===u.id?' selected':'')+'>'+u.nombre+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Estado</label><select id="dg-estado" onchange="renderSec()"><option value="">Todos</option><option value="activos"'+(fEstado==='activos'?' selected':'')+'>En proceso</option><option value="afiliados"'+(fEstado==='afiliados'?' selected':'')+'>Afiliados</option><option value="dropout"'+(fEstado==='dropout'?' selected':'')+'>No continuaron</option></select></div>'
    +'<div class="fg" style="margin:0"><label>Desde</label><input type="date" id="dg-f1" value="'+fF1+'" onchange="renderSec()"></div>'
    +'<div class="fg" style="margin:0"><label>Hasta</label><input type="date" id="dg-f2" value="'+fF2+'" onchange="renderSec()"></div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px">'
    +'<div style="font-size:12px;color:var(--text2)">'+base.length+' conductor'+(base.length!==1?'es':'')+' encontrado'+(base.length!==1?'s':'')+'</div>'
    +'<div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="limpiarDG()"><i class="ti ti-x"></i> Limpiar</button>'
    +'<button class="btn btn-p btn-sm" onclick="exportDataGral()"><i class="ti ti-download"></i> Excel</button></div>'
    +'</div></div>'
    +'<div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table id="sv2-table">'
    +'<thead><tr><th>#</th><th>Nombre</th><th>Celular</th><th>Flota</th><th>Canal</th><th>Agente</th><th>Fecha contacto</th><th>Último mov.</th><th>Días</th><th>Etapa</th><th>Estado</th><th style="text-align:center">Cap.1</th><th style="text-align:center">Cap.2</th><th>Motivo baja</th><th></th></tr></thead>'
    +'<tbody>'+base.map((c,i)=>{
      const ag=ST.users.find(x=>x.id===c.agenteId);
      const et=c.dropout?{label:'No continúa',cls:'e-drop'}:(ETAPAS[c.etapa]||ETAPAS[0]);
      const estadoLabel=c.etapa===7?'<span style="color:var(--green);font-weight:700">✓ Afiliado</span>':c.dropout?'<span style="color:var(--err)">Baja</span>':'<span style="color:var(--blue)">Activo</span>';
      return'<tr>'
        +'<td style="color:var(--text2);font-size:11px">'+(i+1)+'</td>'
        +'<td class="left" style="font-weight:600">'+(c.nombre||'')+'</td>'
        +'<td style="font-size:12px">'+(c.celular?'<a href="tel:'+c.celular+'" style="color:var(--blue)">'+c.celular+'</a>':'—')+'</td>'
        +'<td><span class="stag '+(flotaC[c.flota]||'')+'">'+c.flota+'</span></td>'
        +'<td>'
      +(isMkt
        ?'<span class="stag '+(canalC[c.canal]||'')+'">'+c.canal+'</span>'
        :'<select onchange="editarCanal(\'' +c.id+ '\',this)" style="border:1px solid var(--border2);border-radius:var(--radius-sm);padding:2px 6px;font-size:11px;background:var(--bg2);cursor:pointer;font-weight:600">'+CANALES.map(function(ca){return'<option value="'+ca+'"'+(c.canal===ca?' selected':'')+'>'+ca+'</option>';}).join('')+'</select>'
      )+'</td>'
        +'<td style="font-size:11px">'+(ag?ag.nombre.split(' ')[0]:'—')+'</td>'
        +'<td style="font-size:11px">'+c.fechaContacto+'</td>'
        +(isA
        ?'<td><input type="date" value="'+ultimaFecha(c)+'" onchange="editarUltMov(\''+c.id+'\',this.value)" style="height:26px;font-size:11px;padding:0 4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);width:118px"></td>'
        :'<td style="font-size:11px">'+ultimaFecha(c)+'</td>'
      )
        +'<td>'+diasTag(diasDesde(c.fechaContacto,c))+'</td>'
        +'<td><span class="etag '+et.cls+'">'+et.label+'</span></td>'
        +'<td>'+estadoLabel+'</td>'
        +'<td style="text-align:center">'+(c.etapa===7?(c.cap1?'<span style="color:#166534;font-weight:700">✓</span>':'<span style="color:#9CA3AF;font-size:11px">Pend.</span>'):'—')+'</td>'
        +'<td style="text-align:center">'+(c.etapa===7?(c.cap2?'<span style="color:#166534;font-weight:700">✓</span>':'<span style="color:#9CA3AF;font-size:11px">Pend.</span>'):'—')+'</td>'
        +'<td style="font-size:11px;color:var(--text2)">'+(c.motivoDropout||'—')+'</td>'
        +'<td><button onclick="verConductor(this)" data-id="'+c.id+'" class="btn btn-sm" style="padding:3px 7px"><i class="ti ti-eye" style="color:var(--blue)"></i></button></td>'
        +'</tr>';
    }).join('')+(base.length===0?'<tr><td colspan="13" style="padding:2rem;color:var(--text2);text-align:center">Sin resultados.</td></tr>':'')
    +'</tbody></table></div></div></div>';
}

function renderSupervision(){
  const ESTADOS=[
    {key:'activos',label:'Activos',color:'#185FA5',bg:'#E6F1FB',fn:c=>!c.dropout&&c.etapa>=1&&c.etapa<7},
    {key:'noActivos',label:'No activos',color:'#633806',bg:'#FAEEDA',fn:c=>!c.dropout&&c.etapa===0},
    {key:'califica',label:'Califica',color:'#166534',bg:'#DCFCE7',fn:c=>!c.dropout&&c.etapa>=1},
    {key:'noCalifica',label:'No califica',color:'#A32D2D',bg:'#FCEBEB',fn:c=>c.dropout},
    {key:'antecedentes',label:'Antecedentes',color:'#5B21B6',bg:'#F0E6FF',fn:c=>!c.dropout&&c.etapa===4},
    {key:'evPsico',label:'Ev. Psicológica',color:'#0869C8',bg:'#E8F4FF',fn:c=>!c.dropout&&c.etapa===5},
    {key:'afiliado',label:'Afiliado',color:'#166534',bg:'#DCFCE7',fn:c=>c.etapa===7},
    {key:'noAfiliado',label:'No afiliado',color:'#A32D2D',bg:'#FCEBEB',fn:c=>c.dropout},
  ];
  const fFlota=document.getElementById('sv-flota')?.value||'';
  const fEstado=document.getElementById('sv-estado')?.value||'';
  const fAgente=document.getElementById('sv-agente')?.value||'';
  const fBusca=(document.getElementById('sv-busca')?.value||'').toLowerCase();
  const fF1=document.getElementById('sv-f1')?.value||'';
  const fF2=document.getElementById('sv-f2')?.value||'';
  let base=ST.conductores;
  if(fFlota)base=base.filter(c=>c.flota===fFlota);
  if(fAgente)base=base.filter(c=>c.agenteId===fAgente);
  if(fBusca)base=base.filter(c=>c.nombre.toLowerCase().includes(fBusca));
  if(fF1)base=base.filter(c=>c.fechaContacto>=fF1);
  if(fF2)base=base.filter(c=>c.fechaContacto<=fF2);
  const estadoFn=fEstado?ESTADOS.find(e=>e.key===fEstado)?.fn:null;
  if(estadoFn)base=base.filter(estadoFn);
  const kpis=ESTADOS.map(e=>({...e,count:ST.conductores.filter(c=>fFlota?c.flota===fFlota:true).filter(e.fn).length}));
  return'<div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem">'
    +kpis.map(e=>'<div style="background:'+e.bg+';border:1px solid '+e.color+'33;border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;'+(fEstado===e.key?'box-shadow:0 0 0 2px '+e.color+';':'')+'" onclick="filtrarEstadoSV(this)" data-key="'+e.key+'" data-newval="'+(fEstado===e.key?'':e.key)+'">'
      +'<div style="font-size:22px;font-weight:700;color:'+e.color+'">'+e.count+'</div>'
      +'<div style="font-size:11px;font-weight:600;color:'+e.color+';margin-top:2px">'+e.label+'</div>'
      +'</div>').join('')
    +'</div>'
    +'<div class="card" style="padding:12px">'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;align-items:end">'
    +'<div class="fg" style="margin:0"><label>Buscar</label><input type="text" id="sv-busca" placeholder="Nombre..." oninput="debouncedSearch()" value="'+fBusca+'"></div>'
    +'<div class="fg" style="margin:0"><label>Flota</label><select id="sv-flota" onchange="renderSec()"><option value="">Todas</option>'+FLOTAS.map(f=>'<option value="'+f+'"'+(fFlota===f?' selected':'')+'>'+f+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Estado</label><select id="sv-estado" onchange="renderSec()"><option value="">Todos</option>'+ESTADOS.map(e=>'<option value="'+e.key+'"'+(fEstado===e.key?' selected':'')+'>'+e.label+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Agente</label><select id="sv-agente" onchange="renderSec()"><option value="">Todas</option>'+ST.users.filter(x=>x.role==='agente').map(u=>'<option value="'+u.id+'"'+(fAgente===u.id?' selected':'')+'>'+u.nombre+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:8px;align-items:end">'
    +'<div class="fg" style="margin:0"><label>Desde</label><input type="date" id="sv-f1" value="'+fF1+'" onchange="renderSec()"></div>'
    +'<div class="fg" style="margin:0"><label>Hasta</label><input type="date" id="sv-f2" value="'+fF2+'" onchange="renderSec()"></div>'
    +'<div style="display:flex;gap:6px;padding-bottom:2px"><button class="btn btn-sm" onclick="limpiarSV()"><i class="ti ti-x"></i> Limpiar</button><button class="btn btn-sm" onclick="exportCSVSupervision()"><i class="ti ti-download"></i> CSV</button></div>'
    +'</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:8px">'+base.length+' conductor'+(base.length!==1?'es':'')+' encontrado'+(base.length!==1?'s':'')+'</div>'
    +'</div>'
    +'<div class="card"><div class="tbl-wrap"><table>'
    +'<thead><tr><th>Conductor</th><th>Flota</th><th>Canal</th><th>Agente</th><th>Contacto</th><th>Último mov.</th><th>Días</th><th>Etapa actual</th><th>Estado</th><th></th></tr></thead>'
    +'<tbody>'+base.map(c=>{
      const ag=ST.users.find(x=>x.id===c.agenteId);
      const et=c.dropout?{label:'No continúa',cls:'e-drop'}:(ETAPAS[c.etapa]||ETAPAS[0]);
      const ck=(v)=>v?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--border2)">—</span>';
      return'<tr>'
        +'<td class="left" style="font-weight:600">'+c.nombre+'</td>'
        +'<td><span class="stag '+(flotaC[c.flota]||'')+'">'+c.flota+'</span></td>'
        +'<td>'
      +(isMkt
        ?'<span class="stag '+(canalC[c.canal]||'')+'">'+c.canal+'</span>'
        :'<select onchange="editarCanal(\'' +c.id+ '\',this)" style="border:1px solid var(--border2);border-radius:var(--radius-sm);padding:2px 6px;font-size:11px;background:var(--bg2);cursor:pointer;font-weight:600">'+CANALES.map(function(ca){return'<option value="'+ca+'"'+(c.canal===ca?' selected':'')+'>'+ca+'</option>';}).join('')+'</select>'
      )+'</td>'
        +'<td style="font-size:11px">'+(ag?ag.nombre.split(' ')[0]:'—')+'</td>'
        +'<td style="font-size:11px">'+c.fechaContacto+'</td>'
        +(isA
        ?'<td><input type="date" value="'+ultimaFecha(c)+'" onchange="editarUltMov(\''+c.id+'\',this.value)" style="height:26px;font-size:11px;padding:0 4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg2);width:118px"></td>'
        :'<td style="font-size:11px">'+ultimaFecha(c)+'</td>'
      )
        +'<td>'+diasTag(diasDesde(c.fechaContacto,c))+'</td>'
        +'<td><span class="etag '+et.cls+'">'+et.label+'</span></td>'
        +'<td>'+(c.etapa===7?'<span style="color:var(--green);font-weight:600">✓ Afiliado</span>':c.dropout?'<span style="color:var(--err)">Baja</span>':'<span style="color:var(--blue)">Activo</span>')+'</td>'+'</tr>';
    }).join('')+(base.length===0?'<tr><td colspan="17" style="padding:2rem;color:var(--text2);text-align:center">Sin resultados.</td></tr>':'')
    +'</tbody></table></div></div></div>';
}

function exportCSVSupervision(){exportCSV("supervision");}
function filtrarEstadoSV(el){
  const sel=document.getElementById('sv-estado');
  if(sel){sel.value=el.getAttribute('data-newval');renderSec();}
}
</script>
</body>
</html>
