<!DOCTYPE h`tml>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Leads</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6F9;--bg2:#FFF;--bg3:#F1F3F5;
  --border:#DEE2E6;--border2:#CED4DA;
  --text:#212529;--text2:#6C757D;
  --blue:#378ADD;--blue-dark:#185FA5;--blue-light:#E6F1FB;
  --green:#166534;--green-bg:#DCFCE7;--green-border:#86EFAC;
  --warn:#633806;--warn-bg:#FAEEDA;--warn-border:#FAC775;
  --err:#A32D2D;--err-bg:#FCEBEB;--err-border:#F7C1C1;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 4px rgba(0,0,0,.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.hidden{display:none!important}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#1a3a5c,#2563a8 60%,#378ADD)}
.login-box{background:var(--bg2);border-radius:16px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
.login-hero{position:relative;height:170px;overflow:hidden}
.login-hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.login-hero-icon{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff}
.lh-title{font-size:20px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.lh-sub{font-size:12px;color:rgba(255,255,255,.8)}
.login-body{padding:1.5rem}
.login-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.user-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);cursor:pointer;margin-bottom:8px;transition:all .15s;text-align:left}
.user-btn:hover{background:var(--blue-light);border-color:var(--blue)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.avatar.adm{background:#EEEDFE;color:#3C3489}
.avatar.mkt{background:#FEF3C7;color:#92400E}
.app{max-width:1200px;margin:0 auto;padding:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow)}
.tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:5px;margin-bottom:1rem;flex-wrap:wrap;box-shadow:var(--shadow)}
.tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius-sm);transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.on{background:var(--blue-light);color:var(--blue-dark);font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 10px;font-size:13px;background:var(--bg2);color:var(--text);width:100%;transition:border .15s;font-family:inherit}
input,select{height:36px}
textarea{padding:8px 10px;resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
input[type=password]{letter-spacing:.12em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media(max-width:700px){.g3,.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg2);color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:var(--bg3)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue-dark)}.btn-p:hover{background:var(--blue-dark)}
.btn-g{background:#2d7a3a;color:#fff;border-color:#1a4f24}.btn-g:hover{background:#1a4f24}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{color:var(--err);border-color:var(--err-border)}.btn-danger:hover{background:var(--err-bg)}
.msg{border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.msg-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.msg-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.msg-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-border)}
.msg-info{background:var(--blue-light);color:var(--blue-dark);border:1px solid #B8D9F7}
.err-f{color:var(--err);font-size:11px;margin-top:2px}
.mcard{background:var(--bg3);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid var(--border)}
.mval{font-size:24px;font-weight:700}.mlbl{font-size:11px;color:var(--text2);margin-top:2px}.msub{font-size:12px;font-weight:600;margin-top:3px}
.stag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.t-aero{background:#E1F5EE;color:#085041}.t-air{background:#FAECE7;color:#712B13}.t-city{background:#FBEAF0;color:#72243E}
.t-meta{background:#E6F1FB;color:#0C447C}.t-ref{background:#EAF3DE;color:#27500A}.t-chat{background:#FAEEDA;color:#633806}.t-app{background:#EEEDFE;color:#3C3489}
.t-admin{background:#EEEDFE;color:#3C3489}.t-agente{background:#E6F1FB;color:#0C447C}
.etag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.e0{background:#F1F3F5;color:#6C757D}.e1{background:#E6F1FB;color:#0C447C}.e2{background:#FFF3CD;color:#856404}
.e3{background:#E8F4FF;color:#0869C8}.e4{background:#F0E6FF;color:#5B21B6}.e5{background:#FFF0E6;color:#C2410C}
.e6{background:#DCFCE7;color:#166534}.e-drop{background:#FCEBEB;color:#A32D2D}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);padding:7px 6px;text-align:center;font-weight:600;color:var(--text2);border:1px solid var(--border);font-size:10px;white-space:nowrap}
td{padding:6px 5px;text-align:center;border:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:hover td{background:#f8f9fa}
td.left{text-align:left;padding-left:8px}
.bar-bg{background:var(--bg3);border-radius:20px;height:7px;overflow:hidden;margin-top:5px}
.bar-fill{height:100%;background:var(--blue);border-radius:20px}
.divider{height:1px;background:var(--border);margin:14px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal-box{background:var(--bg2);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:500px;box-shadow:0 12px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);padding:4px 10px;background:var(--bg3);border-radius:20px;border:1px solid var(--border)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.sync-dot.syn{background:#FAC775;animation:pulse .8s infinite}
.sync-dot.err{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.k-col{background:var(--bg3);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border);min-width:155px;min-height:180px;flex:1}
.k-col-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.k-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s}
.k-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.k-name{font-size:12px;font-weight:600;margin-bottom:3px}
.k-meta{font-size:10px;color:var(--text2);margin-top:2px}
.k-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;margin-bottom:4px;cursor:pointer;transition:background .12s}
.k-row:hover{background:var(--blue-light)}
.pill-n{background:var(--blue);color:#fff;border-radius:20px;font-size:10px;padding:1px 6px;font-weight:700}
.days-ok{background:#DCFCE7;color:#166534;border-radius:20px;font-size:10px;padding:2px 6px;display:inline-block;margin-top:3px}
.days-warn{background:#FFF3CD;color:#856404;border-radius:20px;font-size:10px;padding:2px 6px;display:inline-block;margin-top:3px}
.days-late{background:#FCEBEB;color:#A32D2D;border-radius:20px;font-size:10px;padding:2px 6px;display:inline-block;margin-top:3px}
.steps{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:4px 0 8px}
.step-item{display:flex;flex-direction:column;align-items:center;min-width:72px}
.step-c{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);background:var(--bg2);color:var(--text2);z-index:1}
.step-c.done{background:#2d7a3a;border-color:#2d7a3a;color:#fff}
.step-c.active{background:var(--blue);border-color:var(--blue-dark);color:#fff;box-shadow:0 0 0 3px rgba(55,138,221,.2)}
.step-c.drop{background:var(--err);border-color:var(--err);color:#fff}
.step-lbl{font-size:9px;color:var(--text2);text-align:center;margin-top:4px;max-width:65px;line-height:1.3}
.step-line{flex:1;height:2px;background:var(--border);margin-top:15px;min-width:14px}
.step-line.done{background:#2d7a3a}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#6C757D;font-weight:500">Conectando...</div>
</div>
<div id="modal-container"></div>
<div id="root"></div>
<script>
const LS_KEY='leads_local_v5';

const FLOTAS=['Aeropuerto','Aerolíneas','Ciudad'];
const CANALES=['Meta','Referidos','Chat Afiliadora','App/web'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SEMANAS=['1','2','3','4'];
const MESACT=MESES[new Date().getMonth()];
const flotaC={Aeropuerto:'t-aero','Aerolíneas':'t-air',Ciudad:'t-city'};
const canalC={Meta:'t-meta',Referidos:'t-ref','Chat Afiliadora':'t-chat','App/web':'t-app'};

const ETAPAS=[
  {id:0,label:'Contacto',       icon:'ti-phone',         cls:'e0'},
  {id:1,label:'Info enviada',   icon:'ti-send',          cls:'e1'},
  {id:2,label:'Docs recibidos', icon:'ti-file-check',    cls:'e2'},
  {id:3,label:'Formulario',     icon:'ti-forms',         cls:'e3'},
  {id:4,label:'Entrevista Psi.',icon:'ti-brain',         cls:'e4'},
  {id:5,label:'Antecedentes',   icon:'ti-shield-check',  cls:'e5'},
  {id:6,label:'Afiliado ✓',    icon:'ti-check-circle',  cls:'e6'},
];

const DEFAULT_USERS=[
  {id:'u1',nombre:'Andrea Salinas',pin:'1234',role:'agente'},
  {id:'u2',nombre:'Andrea Cornejo',pin:'1234',role:'agente'},
  {id:'u3',nombre:'Jennifer',pin:'1234',role:'agente'},
  {id:'u4',nombre:'Rommy',pin:'1234',role:'agente'},
  {id:'mkt',nombre:'Marketing',pin:'mkt2024',role:'marketing'},
  {id:'admin',nombre:'Supervisor',pin:'admin123',role:'admin'},
];

let ST={
  users:DEFAULT_USERS.map(u=>({...u})),
  conductores:[],
  session:null, tab:'conductores',
  msg:null, msgType:'ok',
  selUser:null,
  syncing:false, syncErr:false, offline:false, lastSync:null,
};

// ── STORAGE: Firebase Realtime Database + localStorage fallback ──
const FB_URL='https://control-leads-9ec22-default-rtdb.firebaseio.com';
const FB_PATH='/leads';

function saveLocal(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      users:ST.users,conductores:ST.conductores,metas:ST.metas,savedAt:new Date().toISOString()
    }));
  }catch(e){}
}

function loadLocal(){
  try{
    const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    if(d.users&&d.users.length) ST.users=d.users;
    if(d.conductores) ST.conductores=d.conductores;
    if(d.metas) ST.metas=d.metas;
    if(d.savedAt) ST.lastSync=new Date(d.savedAt);
  }catch(e){}
}

function syncBadge(){
  const dot=document.getElementById('sdot');
  const lbl=document.getElementById('slbl');
  if(!dot||!lbl)return;
  if(ST.syncing){dot.style.background='#F59E0B';lbl.textContent='Guardando...';return;}
  if(ST.syncErr){dot.style.background='#EF4444';lbl.textContent='Sin conexión';return;}
  dot.style.background='#22C55E';
  lbl.textContent=ST.lastSync?'Sincronizado ✓':'Listo';
}

function hideLoad(){
  document.getElementById('loading-overlay').style.display='none';
}

// Guardar en Firebase Y localStorage
async function saveBin(){
  saveLocal();
  ST.syncing=true; syncBadge();
  try{
    const data={users:ST.users,conductores:ST.conductores,metas:ST.metas||{}};
    const r=await fetch(FB_URL+FB_PATH+'.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify(data)
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    ST.syncErr=false;ST.lastSync=new Date();
  }catch(e){
    console.warn('Firebase save error:',e);
    ST.syncErr=true;
  }
  ST.syncing=false; syncBadge();
}

// Cargar desde Firebase
async function loadBin(){
  try{
    const r=await fetch(FB_URL+FB_PATH+'.json',{method:'GET',headers:{'Accept':'application/json'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d&&d.users&&d.users.length){
      ST.users=d.users;
      ST.conductores=d.conductores||[];
      ST.metas=d.metas||ST.metas;
      saveLocal();
      ST.lastSync=new Date();ST.syncErr=false;
    }
  }catch(e){
    console.warn('Firebase load error:',e);
    ST.syncErr=true;
  }
  syncBadge();
}

// Iniciar: carga local primero (instantáneo) luego Firebase
async function initBin(){
  loadLocal();
  hideLoad();
  render();
  // Luego sincroniza con Firebase en background
  try{
    const r=await fetch(FB_URL+FB_PATH+'.json',{headers:{'Accept':'application/json'}});
    if(r.ok){
      const d=await r.json();
      if(d&&d.conductores!==undefined){
        // Usar Firebase si tiene más o igual data que local
        if(!d.conductores||(d.conductores.length>=ST.conductores.length)){
          ST.users=d.users||ST.users;
          ST.conductores=d.conductores||[];
          ST.metas=d.metas||ST.metas;
          saveLocal();
        }
        ST.lastSync=new Date();ST.syncErr=false;
      }else{
        // Firebase vacío - subir datos locales
        await saveBin();
      }
    }
  }catch(e){
    console.warn('Firebase init error:',e);
    ST.syncErr=true;
  }
  syncBadge();
  renderSec();
  // Auto-refresh cada 30s para ver cambios de otras usuarias
  setInterval(async()=>{
    if(!ST.session||ST.syncing)return;
    try{
      const r=await fetch(FB_URL+FB_PATH+'.json',{headers:{'Accept':'application/json'}});
      if(!r.ok)return;
      const d=await r.json();
      if(d&&d.conductores){
        const remoteLen=d.conductores.length;
        const localLen=ST.conductores.length;
        // Si hay cambios remotos, actualizar
        if(remoteLen!==localLen||JSON.stringify(d.conductores)!==JSON.stringify(ST.conductores)){
          ST.users=d.users||ST.users;
          ST.conductores=d.conductores;
          ST.metas=d.metas||ST.metas;
          saveLocal();
          ST.lastSync=new Date();ST.syncErr=false;
          syncBadge();
          renderSec(); // Re-render para mostrar cambios
        }
      }
    }catch(e){ST.syncErr=true;syncBadge();}
  },30000);
}

// Importar datos desde otro dispositivo
function importarDatos(jsonStr){
  try{
    const d=JSON.parse(jsonStr);
    if(d.users) ST.users=d.users;
    if(d.conductores) ST.conductores=d.conductores;
    saveLocal();
    render();
    gMsg('Datos importados correctamente. '+d.conductores.length+' conductores.');
  }catch(e){gMsg('Error al importar. Verifica el archivo.','err');}
}

// Exportar todos los datos para compartir entre PCs
function exportarTodosDatos(){
  const data={
    users:ST.users,
    conductores:ST.conductores,
    exportadoEn:new Date().toISOString(),
    version:'v5'
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup_leads_'+hoy()+'.json';
  a.click();
  gMsg('Backup descargado. Compártelo con el equipo.');
}

// ── HELPERS ──────────────────────────────────────────────
const sum=(arr,k)=>arr.reduce((a,b)=>a+(+b[k]||0),0);
const pct=(a,b)=>{const av=+a||0,bv=+b||0;return bv>0?(av/bv*100).toFixed(1)+'%':'0%';};
const hoy=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const ini=(n)=>(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const semRng=(s)=>['','1–7','8–14','15–21','22–28'][s]||'';

let _mt=null;
function gMsg(txt,type='ok',auto=4000){
  const el=document.getElementById('gmsg');if(!el)return;
  el.className=`msg msg-${type}`;el.innerHTML=`<i class="ti ti-${type==='ok'?'check-circle':'alert-triangle'}"></i><span>${txt}</span>`;
  el.classList.remove('hidden');
  if(_mt)clearTimeout(_mt);if(auto)_mt=setTimeout(()=>el.classList.add('hidden'),auto);
}
function diasDesde(f,c){
  // Si el conductor ya terminó el proceso (afiliado o dropout), 
  // contar solo hasta el último movimiento, no hasta hoy
  const inicio=new Date(f);
  let fin;
  if(c&&(c.etapa===6||c.dropout)){
    // Usar fecha del último movimiento en historial
    const ult=c.historial&&c.historial.length?c.historial[c.historial.length-1].fecha:f;
    fin=new Date(ult);
  }else{
    fin=new Date();fin.setHours(0,0,0,0);
  }
  inicio.setHours(0,0,0,0);
  return Math.max(0,Math.floor((fin-inicio)/(864e5)));
}
function diasTag(n){
  if(n<=3)return`<span class="days-ok">Día ${n}</span>`;
  if(n<=5)return`<span class="days-warn">Día ${n} ⚠</span>`;
  return`<span class="days-late">Día ${n} 🔴</span>`;
}
// Obtener última fecha de movimiento de un conductor
function ultimaFecha(c){
  if(!c.historial||!c.historial.length)return c.fechaContacto;
  return c.historial[c.historial.length-1].fecha;
}
// Semana del mes según día
function semDia(d){
  const dia=new Date(d).getDate();
  if(dia<=7)return'1';if(dia<=14)return'2';if(dia<=21)return'3';return'4';
}
function mesDeF(f){return MESES[new Date(f).getMonth()]||MESACT;}

// ── RENDER PRINCIPAL ─────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(!ST.session){root.innerHTML=renderLogin();return;}
  const u=ST.users.find(x=>x.id===ST.session);
  const isA=u&&u.role==='admin';
  const isMkt=u&&u.role==='marketing';
  const tabs=isA
    ?[['conductores','ti-users','Afiliados'],['diario','ti-calendar','Hoy'],['datagral','ti-table','Data general'],['supervision','ti-eye','Supervisión'],['semanal','ti-chart-bar','Semana'],['mensual','ti-trending-up','Mes'],['usuarios','ti-settings','Usuarios']]
    :isMkt
    ?[['diario','ti-calendar','Hoy'],['semanal','ti-chart-bar','Semana'],['mensual','ti-trending-up','Mes']]
    :[['conductores','ti-users','Afiliados'],['diario','ti-calendar','Mi día'],['miresumen','ti-chart-pie','Mi resumen']];
  root.innerHTML=`<div class="app">
    <div class="topbar">
      <div>
        <div style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px"><i class="ti ti-headset" style="color:var(--blue);font-size:20px"></i> Control de Leads</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">${new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div class="sync-badge" style="cursor:pointer" onclick="modalSincronizar()" title="Haz clic para sincronizar"><div class="sync-dot" id="sdot" style="background:#22C55E"></div><span id="slbl">Conectando...</span></div>
        <div style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg3);border-radius:20px">
          <div class="avatar ${u.role==='admin'?'adm':u.role==='marketing'?'mkt':''}" style="width:26px;height:26px;font-size:10px">${ini(u.nombre)}</div>
          <span style="font-size:13px;font-weight:500">${u.nombre.split(' ')[0]}</span>
          <span class="stag ${u.role==='admin'?'t-admin':'t-agente'}" style="font-size:10px">${u.role}</span>
        </div>
        <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Salir</button>
      </div>
    </div>
    <div id="gmsg" class="msg hidden"></div>

    <div class="tabs">${tabs.map(([id,ic,lbl])=>`<button class="tab ${ST.tab===id?'on':''}" onclick="setTab('${id}')"><i class="ti ${ic}"></i>${lbl}</button>`).join('')}</div>
    <div id="sec"></div>
  </div>`;
  renderSec();
}
function renderSec(){
  const el=document.getElementById('sec');if(!el)return;
  const u=ST.users.find(x=>x.id===ST.session);
  const isA=u&&u.role==='admin';
  const isMkt=u&&u.role==='marketing';
  if(ST.tab==='conductores')el.innerHTML=renderConductores(isA);
  else if(ST.tab==='diario')el.innerHTML=renderDiario(isA,isMkt);
  else if(ST.tab==='miresumen')el.innerHTML=renderMiResumen();
  else if(ST.tab==='datagral'&&(isA||isMkt))el.innerHTML=renderDataGral();
  else if(ST.tab==='supervision'&&isA)el.innerHTML=renderSupervision();
  else if(ST.tab==='semanal'&&(isA||isMkt))el.innerHTML=renderSemanal();
  else if(ST.tab==='mensual'&&(isA||isMkt))el.innerHTML=renderMensual();
  else if(ST.tab==='usuarios'&&isA)el.innerHTML=renderUsuarios();
}
function setTab(t){ST.tab=t;renderSec();}

function selU(id){ST.selUser=id;ST.msg=null;render();}
function backL(){ST.selUser=null;ST.msg=null;render();}
function doLogin(){
  const u=ST.users.find(x=>x.id===ST.selUser);

// ── MI RESUMEN (agente: hoy + semana + mes con descarga) ─────
function renderMiResumen(){
  const uid=ST.session;
  const u=ST.users.find(x=>x.id===uid);
  const mis=ST.conductores.filter(c=>c.agenteId===uid);
  const h=hoy();
  const mesActual=MESES[new Date().getMonth()];
  const semActual=semDia(h);

  // Filtros
  const fPeriodo=document.getElementById('mr-periodo')?.value||'mes';

  // Seleccionar conductores según periodo
  let base;
  if(fPeriodo==='hoy'){
    const nuevosH=mis.filter(c=>c.fechaContacto===h);
    const movH=mis.filter(c=>c.fechaContacto!==h&&(c.historial||[]).some(x=>x.fecha===h));
    base=[...nuevosH,...movH];
  } else if(fPeriodo==='semana'){
    base=mis.filter(c=>{const ult=ultimaFecha(c);return mesDeF(ult)===mesActual&&semDia(ult)===semActual;});
  } else {
    base=mis.filter(c=>mesDeF(ultimaFecha(c))===mesActual);
  }

  // Stats globales del periodo
  const gt=calcStats(base);
  gt.total   = gt.chats;
  gt.activos = gt.activo;
  gt.calAct  = gt.activo;
  gt.afil    = gt.afiliado;
  gt.drop    = gt.noCalif;
  gt.pre     = gt.bolsa;
  gt.ant     = gt.anteced;
  gt.psi     = gt.evPsic;

  // Función para stats de un subconjunto
  const stats=(arr)=>({
    chats:arr.length,
    calAct:arr.filter(c=>!c.dropout&&c.etapa>=1).length,
    calNo:arr.filter(c=>c.dropout).length,
    ncReq:arr.filter(c=>c.dropout&&c.motivoDropout&&c.motivoDropout.includes('requisitos')).length,
    ncDoc:arr.filter(c=>c.dropout&&c.motivoDropout&&(c.motivoDropout.includes('doc.')||c.motivoDropout.includes('Doc.'))).length,
    // Bolsa = en proceso activo (etapa 1-5), se descuenta al llegar a afiliado o no afiliado
    pre:arr.filter(c=>!c.dropout&&c.etapa>=1&&c.etapa<6).length,
    ant:arr.filter(c=>!c.dropout&&c.etapa===5).length,
    psi:arr.filter(c=>!c.dropout&&c.etapa===4).length,
    afil:arr.filter(c=>c.etapa===6).length,
    noAfil:arr.filter(c=>c.dropout).length,
  });

  const hdStyle='padding:6px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:10px;font-weight:700;background:#DBEAFE;color:#1e3a5f;white-space:nowrap';
  const subHd='padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:10px;font-weight:600;background:#EFF6FF;color:#1e3a5f';
  const cell=(v,bold)=>'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px;'+(bold?'font-weight:700;':'')+'">'+v+'</td>';
  const semHL='background:#F0FDF4';
  const totHL='background:#F1F5F9;font-weight:700';
  const embHL='background:#FEF9C3;font-weight:700;color:#713F12';

  const tablaFlota=(flota)=>{
    const fd=base.filter(c=>c.flota===flota);
    if(!fd.length) return'<div style="padding:10px 14px;color:var(--text2);font-size:12px;display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:8px"><span class="stag '+flotaC[flota]+'">'+flota+'</span> Sin registros en este período.</div>';

    // Agrupar por semana (si es mes o semana) o mostrar todo junto (si es hoy)
    let semsUsadas;
    if(fPeriodo==='hoy'){
      semsUsadas=[{sem:'hoy',label:'Hoy',cs:fd}];
    } else if(fPeriodo==='semana'){
      semsUsadas=[{sem:semActual,label:'Semana '+semActual+' ('+semRng(semActual)+')',cs:fd}];
    } else {
      const semsSet=[...new Set(fd.map(c=>semDia(ultimaFecha(c))))].sort();
      semsUsadas=semsSet.map(s=>({sem:s,label:'Semana '+s+' ('+semRng(s)+')',cs:fd.filter(c=>semDia(ultimaFecha(c))===s)}));
    }

    // Totales por canal
    const canalTots={};
    CANALES.forEach(c=>{canalTots[c]=stats(fd.filter(x=>x.canal===c));});
    const grandTot=stats(fd);

    let rows='';
    semsUsadas.forEach((s,si)=>{
      CANALES.forEach((canal,ci)=>{
        const cst=stats(s.cs.filter(x=>x.canal===canal));
        rows+='<tr>'
          +(ci===0?'<td rowspan="'+CANALES.length+'" style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+semHL+';font-weight:600;vertical-align:middle;font-size:11px">'+s.label+'</td>':'')
          +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px">'+canal+'</td>'
          +cell(cst.chats,true)
          +cell(cst.calAct)    // Activos (etapa 1)
          +cell(cst.calNo)     // No activos (etapa 0)
          +cell(cst.ncReq)     // Califica (etapa 2-3)
          +cell(cst.ncDoc)     // No califica (dropout)
          +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px;background:#EFF6FF;font-weight:600">'+cst.pre+'</td>'
          +cell(cst.ant)+cell(cst.psi)
          +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px;font-weight:600;color:var(--green)">'+cst.afil+'</td>'
          +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-size:11px;font-weight:600;color:var(--err)">'+cst.noAfil+'</td>'
          +'</tr>';
      });
    });

    // Totales por canal
    CANALES.forEach(canal=>{
      const ct=canalTots[canal];
      rows+='<tr style="'+totHL+'">'
        +'<td style="padding:5px 4px;border:0.5px solid #CBD5E1;'+totHL+';font-style:italic" colspan="2">Total '+canal+'</td>'
        +cell(ct.chats,true)+cell(ct.calAct,true)+cell(ct.calNo,true)+cell(ct.ncReq,true)+cell(ct.ncDoc,true)
        +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-weight:700;background:#EFF6FF">'+ct.pre+'</td>'
        +cell(ct.ant,true)+cell(ct.psi,true)
        +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-weight:700;color:var(--green)">'+ct.afil+'</td>'
        +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;font-weight:700;color:var(--err)">'+ct.noAfil+'</td>'
        +'</tr>';
    });

    // Total flota
    rows+='<tr style="background:#BFDBFE;font-weight:700">'
      +'<td style="padding:6px 8px;border:0.5px solid #CBD5E1;background:#BFDBFE;font-weight:700" colspan="2">TOTAL '+flota.toUpperCase()+'</td>'
      +[grandTot.chats,grandTot.calAct,grandTot.calNo,grandTot.ncReq,grandTot.ncDoc].map(v=>'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;background:#BFDBFE;font-weight:700">'+v+'</td>').join('')
        +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;background:#BFDBFE;font-weight:700">'+grandTot.pre+'</td>'
        +[grandTot.ant,grandTot.psi].map(v=>'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;background:#BFDBFE;font-weight:700">'+v+'</td>').join('')
        +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;background:#BFDBFE;font-weight:700;color:var(--green)">'+grandTot.afil+'</td>'
        +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;background:#BFDBFE;font-weight:700;color:var(--err)">'+grandTot.noAfil+'</td>'
      +'</tr>';

    // Embudo %
    rows+='<tr style="'+embHL+'">'
      +'<td style="padding:5px 4px;border:0.5px solid #CBD5E1;'+embHL+'" colspan="2">EMBUDO %</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">100%</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.calAct,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.calNo,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.ncReq,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.ncDoc,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.pre,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.ant,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.psi,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.afil,grandTot.chats)+'</td>'
      +'<td style="padding:5px 4px;text-align:center;border:0.5px solid #CBD5E1;'+embHL+'">'+pct(grandTot.noAfil,grandTot.chats)+'</td>'
      +'</tr>';

    return'<div style="margin-bottom:1rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)">'
      +'<div style="background:#1e3a5f;color:#fff;padding:10px 14px;font-size:13px;font-weight:700">'
      +'<span class="stag" style="background:rgba(255,255,255,.2);color:#fff">'+flota+'</span>'
      +'</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:700px">'
      +'<thead>'
      +'<tr>'
      +'<th style="'+hdStyle+';width:90px">Semana</th>'
      +'<th style="'+hdStyle+';width:100px">Canal</th>'
      +'<th style="'+hdStyle+'">Chats<br>iniciados</th>'
      +'<th style="'+hdStyle+'">Activos</th>'
      +'<th style="'+hdStyle+'">No activos</th>'
      +'<th style="'+hdStyle+'">Califica</th>'
      +'<th style="'+hdStyle+'">No califica</th>'
      +'<th style="'+hdStyle+'">Pre-registros<br>(Bolsa)</th>'
      +'<th style="'+hdStyle+'">Anteced.</th>'
      +'<th style="'+hdStyle+'">Eval.<br>Psic.</th>'
      +'<th style="'+hdStyle+'">Afiliados</th>'
      +'<th style="'+hdStyle+'">No afiliados</th>'
      +'</tr>'
      +'<tr>'
      +'<th style="'+subHd+'"></th><th style="'+subHd+'"></th><th style="'+subHd+'"></th>'
      +'<th style="'+subHd+'"></th><th style="'+subHd+'"></th><th style="'+subHd+'"></th>'
      +'<th style="'+subHd+'"></th><th style="'+subHd+'"></th><th style="'+subHd+'"></th>'
      +'<th style="'+subHd+'"></th>'
      +'</tr>'
      +'</thead>'
      +'<tbody>'+rows+'</tbody>'
      +'</table></div>'
      +'</div>';
  };

  const periodoLabel=fPeriodo==='hoy'?'Hoy':fPeriodo==='semana'?'Semana '+semActual+' ('+semRng(semActual)+')':mesActual;

  return'<div>'
  // Header
  +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">'
  +'<div style="font-size:15px;font-weight:700"><i class="ti ti-chart-pie" style="color:var(--blue);margin-right:6px"></i>Mi resumen — '+(u?u.nombre:'')+'</div>'
  +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
  +'<select id="mr-periodo" onchange="renderSec()" style="height:32px;font-size:13px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--radius-sm)">'
  +'<option value="hoy"'+(fPeriodo==='hoy'?' selected':'')+'>📅 Hoy</option>'
  +'<option value="semana"'+(fPeriodo==='semana'?' selected':'')+'>📊 Esta semana</option>'
  +'<option value="mes"'+(fPeriodo==='mes'?' selected':'')+'>📈 '+mesActual+'</option>'
  +'</select>'
  +'<button class="btn btn-p btn-sm" onclick="exportMiResumen()"><i class="ti ti-download"></i> Excel</button>'
  +'</div>'
  +'</div>'

  // KPIs globales
  +'<div class="card">'
  +'<div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+periodoLabel+' · resumen global</div>'
  +'<div class="g4">'
  +'<div class="mcard"><div class="mval">'+gt.total+'</div><div class="mlbl">Conductores</div></div>'
  +'<div class="mcard"><div class="mval" style="color:var(--blue)">'+gt.calAct+'</div><div class="mlbl">Calificados</div><div class="msub" style="color:var(--blue)">'+pct(gt.calAct,gt.total)+'</div></div>'
  +'<div class="mcard"><div class="mval" style="color:var(--green)">'+gt.afil+'</div><div class="mlbl">Afiliados</div><div class="msub" style="color:var(--green)">'+pct(gt.afil,gt.total)+'</div></div>'
  +'<div class="mcard"><div class="mval" style="color:var(--err)">'+gt.drop+'</div><div class="mlbl">No continuaron</div><div class="msub" style="color:var(--err)">'+pct(gt.drop,gt.total)+'</div></div>'
  +'</div>'
  +'</div>'

  // Tablas por flota
  +FLOTAS.map(f=>tablaFlota(f)).join('')

  +'</div>';
}


function exportMiResumen(){

async function guardarC(){
  const n=document.getElementById('cn-n')?.value.trim();
  const cel=document.getElementById('cn-cel')?.value.trim();
  const fl=document.getElementById('cn-fl')?.value;
  const ca=document.getElementById('cn-ca')?.value;
  const f=document.getElementById('cn-f')?.value||hoy();
  const nota=document.getElementById('cn-nota')?.value||'';
  const err=document.getElementById('cn-err');
  if(!n){err.textContent='El nombre es obligatorio.';return;}
  if(!cel){err.textContent='El celular es obligatorio.';return;}
  if(!fl){err.textContent='Selecciona una flota.';return;}
  if(!ca){err.textContent='Selecciona un canal.';return;}
  const u=ST.users.find(x=>x.id===ST.session);
  const isA=u&&u.role==='admin';
  const agenteId=isA?(document.getElementById('cn-ag')?.value||ST.session):ST.session;
  ST.conductores.push({
    id:'c'+Date.now(),nombre:n,celular:cel,flota:fl,canal:ca,agenteId,
    fechaContacto:f,etapa:0,dropout:false,motivoDropout:'',
    historial:[{fecha:f,etapa:0,nota:nota||'Primer contacto',usuario:u.nombre}],
  });

  gMsg(`Conductor "${n}" registrado.`);
}

function renderDiario(isA,isMkt){
  const h=hoy();
  const agentes=ST.users.filter(x=>x.role==='agente');

  const actividadHoy=(agenteId)=>{
    const cs=ST.conductores.filter(c=>c.agenteId===agenteId);
    const nuevos=cs.filter(c=>c.fechaContacto===h);
    const conMov=cs.filter(c=>c.fechaContacto!==h&&(c.historial||[]).some(x=>x.fecha===h));
    return{nuevos,conMov,todos:[...nuevos,...conMov]};
  };

  // AGENTE: solo ve su propio día
  if(!isA&&!isMkt){
    const uid=ST.session;
    const mis=ST.conductores.filter(c=>c.agenteId===uid);

    // Filtro de fecha
    const fFecha=document.getElementById('md-fecha')?.value||hoy();
    const esHoy=fFecha===hoy();

    // Conductores con actividad en la fecha seleccionada
    const nuevosDia=mis.filter(c=>c.fechaContacto===fFecha);
    const movDia=mis.filter(c=>c.fechaContacto!==fFecha&&(c.historial||[]).some(x=>x.fecha===fFecha));
    const todosDelDia=[...nuevosDia,...movDia];

    // Stats por subconjunto
    const stDia=(arr)=>{
      const s=calcStats(arr);
      return{chats:s.chats,activo:s.activo,noActivo:s.noActivo,
             califica:s.califica,noCalifica:s.noCalif,
             bolsa:s.bolsa,anteced:s.anteced,desaprobK:s.desaprobK,
             evPsic:s.evPsic,desaprobM:s.desaprobM,

    +'<div class="mcard"><div class="mval" style="font-size:18px">'+META_DIARIA+'</div><div class="mlbl">Meta diaria</div><div class="mlbl" style="color:var(--text2);font-size:10px">'+META_AGENTE_DIA+' por agente</div></div>'
    +'<div class="mcard"><div class="mval" style="font-size:18px">'+META_SEMANAL+'</div><div class="mlbl">Meta semanal</div><div class="mlbl" style="color:var(--text2);font-size:10px">'+META_AGENTE_SEM+' por agente</div></div>'

  return '<div>'+cabecera+agentesAdm.map(ag=>tablaAgente(ag)).join('')+'</div>';

        </tr>`;
      }).join('')}</tbody>

}


function calcStats(arr){
  const chats     = arr.length;
  const activo    = arr.filter(c=>!c.dropout&&c.etapa>=1).length;
  const noActivo  = arr.filter(c=>!c.dropout&&c.etapa===0).length;
  const califica  = arr.filter(c=>!c.dropout&&c.etapa>=1).length;
  const noCalif   = arr.filter(c=>c.dropout).length;
  const bolsa     = arr.filter(c=>!c.dropout&&c.etapa>=1&&c.etapa<=5).length;
  const anteced   = arr.filter(c=>!c.dropout&&c.etapa===5).length;
  const desaprobK = arr.filter(c=>c.dropout&&c.etapa===4).length;
  const evPsic    = arr.filter(c=>!c.dropout&&c.etapa===4).length;
  const desaprobM = arr.filter(c=>c.dropout&&c.etapa===5).length;
  const afiliado  = arr.filter(c=>!c.dropout&&c.etapa===6).length;
  const noAfil    = arr.filter(c=>c.dropout).length;
  return{chats,activo,noActivo,califica,noCalif,bolsa,anteced,desaprobK,evPsic,desaprobM,afiliado,noAfil,
    noCalifica:noCalif,noAfiliado:noAfil};
}


function statsCanal(cs){
  const s=calcStats(cs);
  return{
    chats:     s.chats,
    ca:        s.activo,
    cn:        s.noActivo,
    nr:        s.califica,
    nd:        s.noCalif,
    pre:       s.bolsa,
    ant:       s.anteced,
    desaprobK: s.desaprobK,
    psi:       s.evPsic,
    desaprobM: s.desaprobM,
    afil:      s.afiliado,
    noAfil:    s.noAfil,
  };
}

function tablaExcelFlota(flota, semanas_data, metaTotal){
  // semanas_data: array de {sem, label, cs}

    const tot={chats:0,ca:0,cn:0,nr:0,nd:0,pre:0,ant:0,desaprobK:0,psi:0,desaprobM:0,afil:0,noAfil:0};
    CANALES.forEach(c=>{
      const st=statsCanal(s.cs.filter(x=>x.canal===c));
      Object.keys(tot).forEach(k=>tot[k]+=st[k]);
    });
    return tot;
  });
  const grandTot={chats:0,ca:0,cn:0,nr:0,nd:0,pre:0,ant:0,desaprobK:0,psi:0,desaprobM:0,afil:0,noAfil:0};
  const canalTots={};
  CANALES.forEach(c=>{canalTots[c]={chats:0,ca:0,cn:0,nr:0,nd:0,pre:0,ant:0,desaprobK:0,psi:0,desaprobM:0,afil:0,noAfil:0};});
  semanas_data.forEach(s=>{
    CANALES.forEach(c=>{
      const st=statsCanal(s.cs.filter(x=>x.canal===c));
      Object.keys(grandTot).forEach(k=>{if(st[k]!==undefined){grandTot[k]+=st[k]||0;canalTots[c][k]+=st[k]||0;}});

    const st=semTots[si];
    CANALES.forEach((canal,ci)=>{
      const cst=statsCanal(s.cs.filter(x=>x.canal===canal));
      rows+=`<tr>
        ${ci===0?`<td rowspan="${CANALES.length}" style="${cellStyle};${semHL};font-weight:600;vertical-align:middle;text-align:center;font-size:10px">${s.label}</td>`:''}

        ${ci===0?`<td rowspan="${CANALES.length}" style="${cellStyle};${semHL};vertical-align:middle;text-align:center;font-size:10px">${metaTotal>0?Math.round(metaTotal/semanas_data.length):''}</td>

    </tr>`;
  });

  // Total general flota
  rows+=`<tr style="background:#BFDBFE;font-weight:700">
    <td style="${cellStyle};background:#BFDBFE;font-weight:700" colspan="2">TOTAL ${flota.toUpperCase()}</td>

  // Embudo %
  rows+=`<tr style="${embudoHL}">
    <td style="${cellStyle};${embudoHL}" colspan="2">EMBUDO %</td>
    <td style="${cellStyle};${embudoHL}">100%</td>

    <td style="${cellStyle};${embudoHL}">${pct(grandTot.noAfil||0,grandTot.chats)}</td>
    <td style="${cellStyle};${embudoHL}" colspan="2"></td>
  </tr>`;

  return`<div class="card" style="padding:0;overflow:hidden">
    <div style="background:#1e3a5f;color:#fff;padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px">

function renderSemanal(){
  // Obtener todos los meses+semanas con datos
  const periodos={};
  ST.conductores.forEach(c=>{
    const ult=ultimaFecha(c);
    const mes=mesDeF(ult); const sem=semDia(ult);
    const k=`${mes}|${sem}`;
    if(!periodos[k])periodos[k]={mes,sem,cs:[]};
    periodos[k].cs.push(c);
  });

  // Agrupar por mes
  const porMes={};
  Object.values(periodos).forEach(p=>{
    if(!porMes[p.mes])porMes[p.mes]=[];
    porMes[p.mes].push(p);
  });
  const mesesOrdenados=Object.keys(porMes).sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b));

  if(!mesesOrdenados.length) return`<div class="section-hdr">
    <div style="font-size:15px;font-weight:700">Reporte semanal</div>
  </div><div class="card" style="color:var(--text2);text-align:center;padding:2rem">Sin datos registrados.</div>`;

  // Selector de mes
  const mesActivo=document.getElementById('sel-mes-sem')?.value||mesesOrdenados[0];
  const semsDelMes=(porMes[mesActivo]||[]).sort((a,b)=>+a.sem-+b.sem);

  // Meta total (campo editable)
  const metaKey=`meta_${mesActivo}`;
  const metaVal=ST[metaKey]||0;

  return`<div class="section-hdr" style="margin-bottom:12px">
    <div style="font-size:15px;font-weight:700"><i class="ti ti-calendar-week" style="color:var(--blue);margin-right:6px"></i>Reporte semanal</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="sel-mes-sem" onchange="renderSec()" style="height:32px;font-size:13px;padding:0 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);width:auto">
        ${mesesOrdenados.map(m=>`<option value="${m}" ${m===mesActivo?'selected':''}>${m}</option>`).join('')}
      </select>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px">
        <label style="color:var(--text2);font-weight:600">Meta del mes:</label>
        <input type="number" id="meta-mes-inp" value="${metaVal}" min="0" style="width:70px;height:32px;font-size:13px" onchange="setMeta('${mesActivo}',this.value)">
      </div>
      <button class="btn btn-sm" onclick="exportCSV('semanal')"><i class="ti ti-download"></i> Exportar CSV</button>
    </div>
  </div>
  <div class="msg msg-info" style="margin-bottom:12px"><i class="ti ti-info-circle"></i> Agrupado por fecha del último movimiento. Los semanas corresponden al mes seleccionado.</div>
  ${FLOTAS.map(flota=>{
    const semanas_data=semsDelMes.map(p=>({
      sem:p.sem,
      label:`Semana ${p.sem}\n(${semRng(p.sem)})`,
      cs:p.cs.filter(c=>c.flota===flota),
    }));
    if(!semanas_data.some(s=>s.cs.length)) return`<div class="card" style="padding:14px;color:var(--text2);display:flex;align-items:center;gap:8px"><span class="stag ${flotaC[flota]||''}">${flota}</span> Sin datos este mes.</div>`;
    return tablaExcelFlota(flota, semanas_data, metaVal);
  }).join('')}`;
}

function renderMensual(){
  const meses={};

    if(!meses[mes])meses[mes]=[];
    meses[mes].push(c);
  });
  const ms=Object.keys(meses).sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b));

  if(!ms.length) return`<div class="section-hdr"><div style="font-size:15px;font-weight:700">Reporte mensual</div></div>
    <div class="card" style="color:var(--text2);text-align:center;padding:2rem">Sin datos.</div>`;

  return`<div class="section-hdr" style="margin-bottom:12px">
    <div style="font-size:15px;font-weight:700"><i class="ti ti-trending-up" style="color:var(--blue);margin-right:6px"></i>Reporte mensual</div>

  ${ms.map(mes=>{
    const cs=meses[mes];
    const metaVal=ST[`meta_${mes}`]||0;
    // Para el mensual: todas las semanas del mes como un solo bloque
    const semanas_data=[{sem:'total',label:`${mes} completo`,cs}];

    // KPIs rápidos
    const gt=statsCanal(cs);
    const motivos={};
    cs.filter(c=>c.dropout).forEach(c=>{const m=c.motivoDropout||'Sin especificar';motivos[m]=(motivos[m]||0)+1;});
    const motivosHTML=Object.entries(motivos).sort((a,b)=>b[1]-a[1]).slice(0,5)

    return`<div style="margin-bottom:1.5rem">
      <div style="font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <i class="ti ti-calendar-month" style="color:var(--blue)"></i>${mes}
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:400;margin-left:8px">
          <label style="color:var(--text2)">Meta:</label>
          <input type="number" value="${metaVal}" min="0" style="width:70px;height:28px;font-size:12px" onchange="setMeta('${mes}',this.value)">
        </div>
      </div>
      <div class="g4" style="margin-bottom:1rem">
        <div class="mcard"><div class="mval">${gt.chats}</div><div class="mlbl">Chats iniciados</div></div>
        <div class="mcard"><div class="mval" style="color:var(--blue)">${gt.ca||0}</div><div class="mlbl">Cal. activos</div><div class="msub" style="color:var(--blue)">${pct(gt.ca||0,gt.chats)}</div></div>
        <div class="mcard"><div class="mval" style="color:var(--green)">${gt.afil}</div><div class="mlbl">Afiliados</div><div class="msub" style="color:var(--green)">${metaVal>0?pct(gt.afil,metaVal)+' de meta':pct(gt.afil,gt.chats)}</div></div>
        <div class="mcard"><div class="mval" style="color:var(--err)">${cs.filter(c=>c.dropout).length}</div><div class="mlbl">No continuaron</div></div>
      </div>
      ${FLOTAS.map(flota=>{
        const semsDelMes=[];
        // Obtener semanas reales del mes
        const semsSet=new Set(cs.filter(c=>c.flota===flota).map(c=>semDia(ultimaFecha(c))));
        ['1','2','3','4'].filter(s=>semsSet.has(s)||true).forEach(s=>{
          semsDelMes.push({sem:s,label:`Semana ${s} (${semRng(s)})`,cs:cs.filter(c=>c.flota===flota&&semDia(ultimaFecha(c))===s)});
        });
        const hasData=semsDelMes.some(s=>s.cs.length>0);
        if(!hasData) return`<div class="card" style="padding:12px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="stag ${flotaC[flota]||''}">${flota}</span> Sin actividad este mes.</div>`;
        return tablaExcelFlota(flota, semsDelMes, metaVal);
      }).join('')}
      ${motivosHTML?`<div class="card" style="margin-top:8px"><div class="card-title" style="font-size:13px"><i class="ti ti-x" style="color:var(--err)"></i> Motivos de baja — ${mes}</div>${motivosHTML}</div>`:''}

}

function exportCSV(tipo){
  let csv='\uFEFF';
  if(tipo==='conductores'){
    csv+='Nombre,Flota,Canal,Agente,Fecha contacto,Último movimiento,Etapa,Días proceso,Estado,Motivo baja\n';
    ST.conductores.forEach(c=>{
      const ag=ST.users.find(x=>x.id===c.agenteId);
      const et=c.dropout?'No continúa':(ETAPAS[c.etapa]?.label||'—');
      csv+=`"${c.nombre}","${c.flota}","${c.canal}","${ag?ag.nombre:'—'}","${c.fechaContacto}","${ultimaFecha(c)}","${et}",${diasDesde(c.fechaContacto)},"${c.dropout?'Baja':'Activo'}","${c.motivoDropout||''}"\n`;
    });
  } else if(tipo==='diario'){
    const h=hoy();
    const nuevos=ST.conductores.filter(c=>c.fechaContacto===h);
    const conMov=ST.conductores.filter(c=>c.fechaContacto!==h&&(c.historial||[]).some(x=>x.fecha===h));
    csv+='Tipo,Nombre,Flota,Canal,Agente,Etapa,Días,Nota hoy\n';
    [...nuevos.map(c=>['Nuevo',...c]),...conMov.map(c=>['Avance',...c])].forEach(([tipo2,...rest])=>{
      const c=rest[0]||rest;
      const conductor=typeof c==='object'?c:null;if(!conductor)return;
      const ag=ST.users.find(x=>x.id===conductor.agenteId);
      const et=conductor.dropout?'No continúa':(ETAPAS[conductor.etapa]?.label||'—');
      const ultH=(conductor.historial||[]).filter(x=>x.fecha===h).slice(-1)[0];
      csv+=`"${tipo2}","${conductor.nombre}","${conductor.flota}","${conductor.canal}","${ag?ag.nombre:'—'}","${et}",${diasDesde(conductor.fechaContacto)},"${ultH?ultH.nota:''}"\n`;
    });
  } else {
    csv+='Mes,Total actividad,Nuevos,En proceso,Afiliados,No continuaron,% Conversión\n';
    const meses={};
    ST.conductores.forEach(c=>{const m=mesDeF(ultimaFecha(c));if(!meses[m])meses[m]=[];meses[m].push(c);});
    Object.keys(meses).sort((a,b)=>MESES.indexOf(a)-MESES.indexOf(b)).forEach(mes=>{
      const cs=meses[mes];
      const nuevos=cs.filter(c=>mesDeF(c.fechaContacto)===mes).length;
      const afil=cs.filter(c=>c.etapa===6).length;
      csv+=`"${mes}",${cs.length},${nuevos},${cs.filter(c=>!c.dropout&&c.etapa<6).length},${afil},${cs.filter(c=>c.dropout).length},"${pct(afil,cs.length)}"\n`;
    });
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`leads_${tipo}_${hoy()}.csv`;a.click();
  gMsg('CSV descargado. Ábrelo con Excel.');
}

function exportarXLSX(filas,nombre){
  const ag_name=(id)=>{const u=ST.users.find(x=>x.id===id);return u?u.nombre:'';};
  let html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body><table border="1">';
  html+='<tr style="background:#1e3a5f;color:#ffffff;font-weight:bold;font-size:12px">';
  ['#','Nombre','Celular','Flota','Canal','Agente','Fecha contacto','Ultimo movimiento','Dias en proceso','Etapa actual','Estado','Motivo baja'].forEach(h=>{html+='<td style="padding:6px 10px">'+h+'</td>';});
  html+='</tr>';
  filas.forEach((c,i)=>{
    const et=c.dropout?'No continua':(ETAPAS[c.etapa]?ETAPAS[c.etapa].label:'');
    const estado=c.etapa===6?'Afiliado':c.dropout?'Baja':'Activo';
    const bg=i%2===0?'#FFFFFF':'#F8F9FA';
    html+='<tr style="background:'+bg+';font-size:11px">';
    html+='<td style="text-align:center">'+(i+1)+'</td>';
    html+='<td style="font-weight:600">'+c.nombre+'</td>';
    html+='<td>'+(c.celular||'')+'</td>';
    html+='<td>'+c.flota+'</td>';
    html+='<td>'+c.canal+'</td>';
    html+='<td>'+ag_name(c.agenteId)+'</td>';
    html+='<td>'+c.fechaContacto+'</td>';
    html+='<td>'+ultimaFecha(c)+'</td>';
    html+='<td>'+diasDesde(c.fechaContacto,c)+'</td>';
    html+='<td>'+et+'</td>';
    const estadoColor=c.etapa===6?'color:#166534;font-weight:bold':c.dropout?'color:#A32D2D;font-weight:bold':'color:#185FA5';
    html+='<td style="'+estadoColor+'">'+estado+'</td>';
    html+='<td>'+(c.motivoDropout||'')+'</td>';
    html+='</tr>';
  });
  html+='</table></body></html>';
  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=nombre.replace('.xlsx','.xls');
  a.click();
}

function exportDataGral(){
  const fFlota=document.getElementById('dg-flota')?.value||'';
  const fCanal=document.getElementById('dg-canal')?.value||'';
  const fAgente=document.getElementById('dg-agente')?.value||'';
  const fEstado=document.getElementById('dg-estado')?.value||'';
  const fBusca=(document.getElementById('dg-busca')?.value||'').toLowerCase();
  const fCel=(document.getElementById('dg-cel')?.value||'').replace(/\D/g,'');
  const fF1=document.getElementById('dg-f1')?.value||'';
  const fF2=document.getElementById('dg-f2')?.value||'';
  let base=[...ST.conductores].sort((a,b)=>b.fechaContacto.localeCompare(a.fechaContacto));
  if(fFlota) base=base.filter(c=>c.flota===fFlota);
  if(fCanal) base=base.filter(c=>c.canal===fCanal);
  if(fAgente) base=base.filter(c=>c.agenteId===fAgente);
  if(fEstado==='activos') base=base.filter(c=>!c.dropout&&c.etapa<6);
  else if(fEstado==='afiliados') base=base.filter(c=>c.etapa===6);
  else if(fEstado==='dropout') base=base.filter(c=>c.dropout);
  if(fBusca) base=base.filter(c=>c.nombre.toLowerCase().includes(fBusca)||(c.celular||'').includes(fBusca));
  if(fCel) base=base.filter(c=>(c.celular||'').replace(/\D/g,'').includes(fCel));
  if(fF1) base=base.filter(c=>c.fechaContacto>=fF1);
  if(fF2) base=base.filter(c=>c.fechaContacto<=fF2);
  exportarXLSX(base,'data_general_'+hoy()+'.xls');
  gMsg('Excel descargado: '+base.length+' registros.');
}

        <button class="btn btn-sm" onclick="closeM()">Cancelar</button>
        <button class="btn btn-p btn-sm" onclick="guardarMetas()"><i class="ti ti-check"></i> Guardar</button>
      </div>
    </div></div>`;
}

async function guardarMetas(){
  ST.metas={
    anual:   +document.getElementById('m-anual').value||1000,
    mensual: +document.getElementById('m-mensual').value||83,
    semanal: +document.getElementById('m-semanal').value||20,
    diaria:  +document.getElementById('m-diaria').value||4,
    agenteDia: +document.getElementById('m-agdia').value||1,
    agenteSem: +document.getElementById('m-agsem').value||5,
    agenteMes: +document.getElementById('m-agmes').value||21,
  };
  await saveBin();closeM();renderSec();
  gMsg('Metas actualizadas.');
}

function modalSincronizar(){
  const savedAt=ST.lastSync?ST.lastSync.toLocaleString('es-PE'):'Nunca';
  const estado=ST.syncErr?'🔴 Sin conexión a Firebase':'🟢 Conectado a Firebase';
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeM()"><div class="modal-box">
      <div class="card-title"><i class="ti ti-refresh" style="color:var(--blue)"></i> Sincronización en tiempo real</div>
      <div style="background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;margin-bottom:12px">
        <strong>Estado:</strong> ${estado}<br>
        <strong>Última sync:</strong> ${savedAt}<br>
        <strong>Conductores:</strong> ${ST.conductores.length}<br>
        <strong>Auto-actualización:</strong> cada 30 segundos
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">
        Los datos se sincronizan automáticamente entre todos los dispositivos vía Firebase.<br>
        Cada vez que una afiliadora registra un conductor, se actualiza para todas.
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-p" onclick="sincronizarAhora()"><i class="ti ti-refresh"></i> Sincronizar ahora</button>
        <button class="btn" onclick="exportarTodosDatos();closeM()"><i class="ti ti-download"></i> Exportar backup</button>
        <button class="btn" onclick="closeM()">Cerrar</button>
      </div>
    </div></div>`;
}

async function sincronizarAhora(){
  closeM();
  gMsg('Sincronizando con Firebase...');
  await loadBin();
  renderSec();
  gMsg('Datos actualizados.');
}

function leerImport(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=(e)=>{importarDatos(e.target.result);closeM();};
  r.readAsText(file);
}


function renderDataGral(){
  const fFlota=document.getElementById('dg-flota')?.value||'';
  const fCanal=document.getElementById('dg-canal')?.value||'';
  const fAgente=document.getElementById('dg-agente')?.value||'';
  const fEstado=document.getElementById('dg-estado')?.value||'';
  const fBusca=(document.getElementById('dg-busca')?.value||'').toLowerCase();
  const fCel=(document.getElementById('dg-cel')?.value||'').replace(/\D/g,'');
  const fF1=document.getElementById('dg-f1')?.value||'';
  const fF2=document.getElementById('dg-f2')?.value||'';
  let base=[...ST.conductores].sort((a,b)=>b.fechaContacto.localeCompare(a.fechaContacto));
  if(fFlota) base=base.filter(c=>c.flota===fFlota);
  if(fCanal) base=base.filter(c=>c.canal===fCanal);
  if(fAgente) base=base.filter(c=>c.agenteId===fAgente);
  if(fEstado==='activos') base=base.filter(c=>!c.dropout&&c.etapa<6);
  else if(fEstado==='afiliados') base=base.filter(c=>c.etapa===6);
  else if(fEstado==='dropout') base=base.filter(c=>c.dropout);
  if(fBusca) base=base.filter(c=>c.nombre.toLowerCase().includes(fBusca)||(c.celular||'').includes(fBusca));
  if(fCel) base=base.filter(c=>(c.celular||'').replace(/\D/g,'').includes(fCel));
  if(fF1) base=base.filter(c=>c.fechaContacto>=fF1);
  if(fF2) base=base.filter(c=>c.fechaContacto<=fF2);
  const all=ST.conductores;
  const kT=all.length,kA=all.filter(c=>!c.dropout&&c.etapa<6).length,kAf=all.filter(c=>c.etapa===6).length,kD=all.filter(c=>c.dropout).length;
  return'<div>'
    +'<div class="g4" style="margin-bottom:1rem">'
    +'<div class="mcard"><div class="mval">'+kT+'</div><div class="mlbl">Total registrados</div></div>'
    +'<div class="mcard"><div class="mval" style="color:var(--blue)">'+kA+'</div><div class="mlbl">En proceso</div></div>'
    +'<div class="mcard"><div class="mval" style="color:var(--green)">'+kAf+'</div><div class="mlbl">Afiliados</div><div class="msub" style="color:var(--green)">'+pct(kAf,kT)+'</div></div>'
    +'<div class="mcard"><div class="mval" style="color:var(--err)">'+kD+'</div><div class="mlbl">No continuaron</div></div>'
    +'</div>'
    +'<div class="card" style="padding:12px">'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:8px">'
    +'<div class="fg" style="margin:0"><label>Nombre</label><input type="text" id="dg-busca" placeholder="Buscar nombre..." oninput="renderSec()"></div>'
    +'<div class="fg" style="margin:0"><label>Celular</label><input type="text" id="dg-cel" placeholder="Ej: 999888..." oninput="renderSec()"></div>'
    +'<div class="fg" style="margin:0"><label>Flota</label><select id="dg-flota" onchange="renderSec()"><option value="">Todas</option>'+FLOTAS.map(f=>'<option value="'+f+'"'+(fFlota===f?' selected':'')+'>'+f+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Canal</label><select id="dg-canal" onchange="renderSec()"><option value="">Todos</option>'+CANALES.map(c=>'<option value="'+c+'"'+(fCanal===c?' selected':'')+'>'+c+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;align-items:end">'
    +'<div class="fg" style="margin:0"><label>Agente</label><select id="dg-agente" onchange="renderSec()"><option value="">Todos</option>'+ST.users.filter(x=>x.role==='agente').map(u=>'<option value="'+u.id+'"'+(fAgente===u.id?' selected':'')+'>'+u.nombre+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Estado</label><select id="dg-estado" onchange="renderSec()"><option value="">Todos</option><option value="activos"'+(fEstado==='activos'?' selected':'')+'>En proceso</option><option value="afiliados"'+(fEstado==='afiliados'?' selected':'')+'>Afiliados</option><option value="dropout"'+(fEstado==='dropout'?' selected':'')+'>No continuaron</option></select></div>'
    +'<div class="fg" style="margin:0"><label>Desde</label><input type="date" id="dg-f1" value="'+fF1+'" onchange="renderSec()"></div>'
    +'<div class="fg" style="margin:0"><label>Hasta</label><input type="date" id="dg-f2" value="'+fF2+'" onchange="renderSec()"></div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px">'
    +'<div style="font-size:12px;color:var(--text2)">'+base.length+' conductor'+(base.length!==1?'es':'')+' encontrado'+(base.length!==1?'s':'')+'</div>'
    +'<div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="limpiarDG()"><i class="ti ti-x"></i> Limpiar</button>'
    +'<button class="btn btn-p btn-sm" onclick="exportDataGral()"><i class="ti ti-download"></i> Excel</button></div>'
    +'</div></div>'
    +'<div class="card" style="padding:0;overflow:hidden"><div class="tbl-wrap"><table>'
    +'<thead><tr><th>#</th><th>Nombre</th><th>Celular</th><th>Flota</th><th>Canal</th><th>Agente</th><th>Fecha contacto</th><th>Último mov.</th><th>Días</th><th>Etapa</th><th>Estado</th><th style="text-align:center">Cap.1</th><th style="text-align:center">Cap.2</th><th>Motivo baja</th><th></th></tr></thead>'
    +'<tbody>'+base.map((c,i)=>{
      const ag=ST.users.find(x=>x.id===c.agenteId);
      const et=c.dropout?{label:'No continúa',cls:'e-drop'}:(ETAPAS[c.etapa]||ETAPAS[0]);
      const estadoLabel=c.etapa===6?'<span style="color:var(--green);font-weight:700">✓ Afiliado</span>':c.dropout?'<span style="color:var(--err)">Baja</span>':'<span style="color:var(--blue)">Activo</span>';
      return'<tr>'
        +'<td style="color:var(--text2);font-size:11px">'+(i+1)+'</td>'
        +'<td class="left" style="font-weight:600">'+(c.nombre||'')+'</td>'
        +'<td style="font-size:12px">'+(c.celular?'<a href="tel:'+c.celular+'" style="color:var(--blue)">'+c.celular+'</a>':'—')+'</td>'
        +'<td><span class="stag '+(flotaC[c.flota]||'')+'">'+c.flota+'</span></td>'
        +'<td><span class="stag '+(canalC[c.canal]||'')+'">'+c.canal+'</span></td>'
        +'<td style="font-size:11px">'+(ag?ag.nombre.split(' ')[0]:'—')+'</td>'
        +'<td style="font-size:11px">'+c.fechaContacto+'</td>'
        +'<td style="font-size:11px">'+ultimaFecha(c)+'</td>'
        +'<td>'+diasTag(diasDesde(c.fechaContacto,c))+'</td>'
        +'<td><span class="etag '+et.cls+'">'+et.label+'</span></td>'
        +'<td>'+estadoLabel+'</td>'
        +'<td style="text-align:center">'+(c.etapa===6?(c.cap1?'<span style="color:#166534;font-weight:700">✓</span>':'<span style="color:#9CA3AF;font-size:11px">Pend.</span>'):'—')+'</td>'
        +'<td style="text-align:center">'+(c.etapa===6?(c.cap2?'<span style="color:#166534;font-weight:700">✓</span>':'<span style="color:#9CA3AF;font-size:11px">Pend.</span>'):'—')+'</td>'
        +'<td style="font-size:11px;color:var(--text2)">'+(c.motivoDropout||'—')+'</td>'
        +'<td><button onclick="verConductor(this)" data-id="'+c.id+'" class="btn btn-sm" style="padding:3px 7px"><i class="ti ti-eye" style="color:var(--blue)"></i></button></td>'
        +'</tr>';
    }).join('')+(base.length===0?'<tr><td colspan="13" style="padding:2rem;color:var(--text2);text-align:center">Sin resultados.</td></tr>':'')
    +'</tbody></table></div></div></div>';
}

function renderSupervision(){
  const ESTADOS=[
    {key:'activos',label:'Activos',color:'#185FA5',bg:'#E6F1FB',fn:c=>!c.dropout&&c.etapa>=1&&c.etapa<6},
    {key:'noActivos',label:'No activos',color:'#633806',bg:'#FAEEDA',fn:c=>!c.dropout&&c.etapa===0},
    {key:'califica',label:'Califica',color:'#166534',bg:'#DCFCE7',fn:c=>!c.dropout&&c.etapa>=1},
    {key:'noCalifica',label:'No califica',color:'#A32D2D',bg:'#FCEBEB',fn:c=>c.dropout},
    {key:'antecedentes',label:'Antecedentes',color:'#5B21B6',bg:'#F0E6FF',fn:c=>!c.dropout&&c.etapa===5},
    {key:'evPsico',label:'Ev. Psicológica',color:'#0869C8',bg:'#E8F4FF',fn:c=>!c.dropout&&c.etapa===4},
    {key:'afiliado',label:'Afiliado',color:'#166534',bg:'#DCFCE7',fn:c=>c.etapa===6},
    {key:'noAfiliado',label:'No afiliado',color:'#A32D2D',bg:'#FCEBEB',fn:c=>c.dropout},
  ];
  const fFlota=document.getElementById('sv-flota')?.value||'';
  const fEstado=document.getElementById('sv-estado')?.value||'';
  const fAgente=document.getElementById('sv-agente')?.value||'';
  const fBusca=(document.getElementById('sv-busca')?.value||'').toLowerCase();
  const fF1=document.getElementById('sv-f1')?.value||'';
  const fF2=document.getElementById('sv-f2')?.value||'';
  let base=ST.conductores;
  if(fFlota)base=base.filter(c=>c.flota===fFlota);
  if(fAgente)base=base.filter(c=>c.agenteId===fAgente);
  if(fBusca)base=base.filter(c=>c.nombre.toLowerCase().includes(fBusca));
  if(fF1)base=base.filter(c=>c.fechaContacto>=fF1);
  if(fF2)base=base.filter(c=>c.fechaContacto<=fF2);
  const estadoFn=fEstado?ESTADOS.find(e=>e.key===fEstado)?.fn:null;
  if(estadoFn)base=base.filter(estadoFn);
  const kpis=ESTADOS.map(e=>({...e,count:ST.conductores.filter(c=>fFlota?c.flota===fFlota:true).filter(e.fn).length}));
  return'<div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem">'
    +kpis.map(e=>'<div style="background:'+e.bg+';border:1px solid '+e.color+'33;border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;'+(fEstado===e.key?'box-shadow:0 0 0 2px '+e.color+';':'')+'" onclick="filtrarEstadoSV(this)" data-key="'+e.key+'" data-newval="'+(fEstado===e.key?'':e.key)+'">'
      +'<div style="font-size:22px;font-weight:700;color:'+e.color+'">'+e.count+'</div>'
      +'<div style="font-size:11px;font-weight:600;color:'+e.color+';margin-top:2px">'+e.label+'</div>'
      +'</div>').join('')
    +'</div>'
    +'<div class="card" style="padding:12px">'
    +'<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;align-items:end">'
    +'<div class="fg" style="margin:0"><label>Buscar</label><input type="text" id="sv-busca" placeholder="Nombre..." oninput="renderSec()" value="'+fBusca+'"></div>'
    +'<div class="fg" style="margin:0"><label>Flota</label><select id="sv-flota" onchange="renderSec()"><option value="">Todas</option>'+FLOTAS.map(f=>'<option value="'+f+'"'+(fFlota===f?' selected':'')+'>'+f+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Estado</label><select id="sv-estado" onchange="renderSec()"><option value="">Todos</option>'+ESTADOS.map(e=>'<option value="'+e.key+'"'+(fEstado===e.key?' selected':'')+'>'+e.label+'</option>').join('')+'</select></div>'
    +'<div class="fg" style="margin:0"><label>Agente</label><select id="sv-agente" onchange="renderSec()"><option value="">Todas</option>'+ST.users.filter(x=>x.role==='agente').map(u=>'<option value="'+u.id+'"'+(fAgente===u.id?' selected':'')+'>'+u.nombre+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:8px;align-items:end">'
    +'<div class="fg" style="margin:0"><label>Desde</label><input type="date" id="sv-f1" value="'+fF1+'" onchange="renderSec()"></div>'
    +'<div class="fg" style="margin:0"><label>Hasta</label><input type="date" id="sv-f2" value="'+fF2+'" onchange="renderSec()"></div>'
    +'<div style="display:flex;gap:6px;padding-bottom:2px"><button class="btn btn-sm" onclick="limpiarSV()"><i class="ti ti-x"></i> Limpiar</button><button class="btn btn-sm" onclick="exportCSVSupervision()"><i class="ti ti-download"></i> CSV</button></div>'
    +'</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:8px">'+base.length+' conductor'+(base.length!==1?'es':'')+' encontrado'+(base.length!==1?'s':'')+'</div>'
    +'</div>'
    +'<div class="card"><div class="tbl-wrap"><table>'
    +'<thead><tr><th>Conductor</th><th>Flota</th><th>Canal</th><th>Agente</th><th>Contacto</th><th>Último</th><th>Días</th><th>Activo</th><th>No activo</th><th>Califica</th><th>No califica</th><th>Anteced.</th><th>Ev. Psic.</th><th>Afiliado</th><th>No afiliado</th><th>Etapa</th><th></th></tr></thead>'
    +'<tbody>'+base.map(c=>{
      const ag=ST.users.find(x=>x.id===c.agenteId);
      const et=c.dropout?{label:'No continúa',cls:'e-drop'}:(ETAPAS[c.etapa]||ETAPAS[0]);
      const ck=(v)=>v?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--border2)">—</span>';
      return'<tr>'
        +'<td class="left" style="font-weight:600">'+c.nombre+'</td>'
        +'<td><span class="stag '+(flotaC[c.flota]||'')+'">'+c.flota+'</span></td>'
        +'<td><span class="stag '+(canalC[c.canal]||'')+'">'+c.canal+'</span></td>'
        +'<td style="font-size:11px">'+(ag?ag.nombre.split(' ')[0]:'—')+'</td>'
        +'<td style="font-size:11px">'+c.fechaContacto+'</td>'
        +'<td style="font-size:11px">'+ultimaFecha(c)+'</td>'
        +'<td>'+diasTag(diasDesde(c.fechaContacto,c))+'</td>'
        +ck(!c.dropout&&c.etapa>=1&&c.etapa<6)+'</td><td>'+ck(!c.dropout&&c.etapa===0)+'</td>'
        +'<td>'+ck(!c.dropout&&c.etapa>=1)+'</td><td>'+ck(c.dropout)+'</td>'
        +'<td>'+ck(!c.dropout&&c.etapa===5)+'</td><td>'+ck(!c.dropout&&c.etapa===4)+'</td>'
        +'<td>'+ck(c.etapa===6)+'</td><td>'+ck(c.dropout)+'</td>'
        +'<td><span class="etag '+et.cls+'">'+et.label+'</span></td>'
        +'<td><button onclick="verConductor(this)" data-id="'+c.id+'" class="btn btn-sm" style="padding:3px 7px"><i class="ti ti-eye" style="color:var(--blue)"></i></button></td>'
        +'</tr>';
    }).join('')+(base.length===0?'<tr><td colspan="17" style="padding:2rem;color:var(--text2);text-align:center">Sin resultados.</td></tr>':'')
    +'</tbody></table></div></div></div>';
}

function exportCSVSupervision(){exportCSV("supervision");}
function filtrarEstadoSV(el){
  const sel=document.getElementById('sv-estado');
  if(sel){sel.value=el.getAttribute('data-newval');renderSec();}
}


initBin();
